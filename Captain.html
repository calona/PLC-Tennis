<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Captain Dashboard</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    .match { padding: 12px; background: #eee; margin: 10px 0; border-radius: 6px; cursor: pointer; }
    .match:hover { background: #ddd; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 10px; border-bottom: 1px solid #ccc; }
    .Available { background: #4CAF50; color: white; padding: 6px 12px; border-radius: 4px; }
    .Maybe { background: #FFC107; color: black; padding: 6px 12px; border-radius: 4px; }
    .Unavailable { background: #F44336; color: white; padding: 6px 12px; border-radius: 4px; }
  </style>
</head>

<body>

<h1>Captain Dashboard</h1>

<h2>Matches</h2>
<div id="matchList">Loading matches...</div>

<h2>Availability</h2>
<table>
  <thead>
    <tr><th>Player</th><th>Status</th><th>Updated</th></tr>
  </thead>
  <tbody id="availabilityBody"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "plc-tennis.firebaseapp.com",
  projectId: "plc-tennis",
  storageBucket: "plc-tennis.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-KfGVV4zKjLXTxXpJcaHA7KIjpQGHfMPU6CIgmUYEnh1Aed-bwrnfZIn1M6B08qSKsC1QcQMQ6f9U/pub?output=csv";

async function loadMatches() {
  const res = await fetch(SHEET_URL);
  const csv = await res.text();
  const rows = csv.split("\n").map(r => r.split(","));

  let rawHeaders = rows[2].map(h => h.trim());
  const headers = [];
  const headerIndexMap = [];

  rawHeaders.forEach((h, i) => {
    if (h !== "") {
      headers.push(h);
      headerIndexMap.push(i);
    }
  });

  const dataRows = rows.slice(3);

  return dataRows.map(r => {
    const obj = {};
    headers.forEach((h, idx) => {
      obj[h] = r[headerIndexMap[idx]]?.trim();
    });
    return obj;
  });
}

loadMatches().then(matches => {
  const list = document.getElementById("matchList");
  list.innerHTML = "";

  matches.forEach(m => {
    if (!m["Match #"]) return;

    const div = document.createElement("div");
    div.className = "match";
    div.innerText =
      `${m["Team"]} Match ${m["Match #"]} — ${m["Date"]} — ${m["Home/Away"]} vs ${m["Opponent"]}`;

    div.onclick = () => loadAvailability(m["Match #"]);
    list.appendChild(div);
  });
});

async function loadAvailability(matchId) {
  const tbody = document.getElementById("availabilityBody");
  tbody.innerHTML = "";

  const snap = await db.collection("availability")
    .where("matchId", "==", matchId)
    .orderBy("timestamp", "desc")
    .get();

  snap.forEach(doc => {
    const d = doc.data();
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${d.player}</td>
      <td><span class="${d.status}">${d.status}</span></td>
      <td>${d.timestamp.toDate().toLocaleString()}</td>
    `;

    tbody.appendChild(row);
  });
}
</script>

</body>
</html>
