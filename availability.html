<!-- MAIN -->
<main class="page">

    <!-- League filter -->
    <div class="filter-row">
        <span class="filter-label">League:</span>
        <select id="leagueSelect" class="filter-select" onchange="changeLeague()">
            <option value="all">All Leagues</option>

            <option value="55">55+</option>

    <!-- Prev / Next -->
    <div class="match-nav">
        <button class="match-nav-btn" onclick="prevMatch()">⬅ Previous</button>
        <button class="match-nav-btn" onclick="nextMatch()">Next ➡</button>
    </div>

    <!-- Match header -->
    <div class="match-header">
        <div class="match-header-pill"></div>
        <span class="match-counter" id="matchCounter"></span>
        <div class="match-league-pill" id="matchLeaguePill">Loading…</div>

        <div class="match-datetime">
            <span class="match-date" id="matchDate">—</span>
            <span class="match-time" id="matchTime">—</span>
        </div>

        <div class="match-teams" id="matchTeams">—</div>
        <div class="match-venue" id="matchVenue">📍 —</div>
    </div>

    <!-- NEW: No response banner -->
    <div id="noResponseBanner">⚠️ No response yet — please choose one</div>

    <!-- Availability buttons -->
    <div class="section-label">Your availability</div>
    <div class="avail-buttons">
        <button class="avail-btn yes" onclick="setAvailability('Yes')"><span class="icon">✔</span>Yes, I can play</button>
        <button class="avail-btn no" onclick="setAvailability('No')"><span class="icon">✖</span>No, I cannot play</button>
        <button class="avail-btn maybe" onclick="setAvailability('Maybe')"><span class="icon">❓</span>Maybe</button>
        <button class="avail-btn conflict" onclick="setAvailability('Maybe - conflict')"><span class="icon">⚠</span>Maybe — conflicts with another match</button>
    </div>

    <!-- Notes -->
    <div class="section-label">Notes (optional)</div>
    <textarea id="playerNotes" class="notes-textarea" rows="3" placeholder="e.g., 'I can play only after 6pm'"></textarea>

    <div id="msg"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
/* --- Firebase init unchanged --- */
const firebaseConfig = {
    apiKey: "AIzaSyBRS15FxZ8ekWvcAluTy2EKUVCMs0gkYPg",
    authDomain: "plc-tennis.firebaseapp.com",
    projectId: "plc-tennis",
    storageBucket: "plc-tennis.appspot.com",
    messagingSenderId: "472563332469",
    appId: "1:472563332469:web:b781075e99cd0f5a3c4f3c"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user => {
    if (!user) {
        window.location.href = "login.html";
    } else {
        loadAllMatches();
    }
});

function logout() {
    auth.signOut().then(() => window.location.href = "login.html");
}

/* -----------------------------
   MATCH LOADING + FILTERING
------------------------------ */

let allMatches = [];
let filteredMatches = [];
let currentIndex = 0;

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-KfGVV4zKjLXTxXpJcaHA7KIjpQGHfMPU6CIgmUYEnh1Aed-bwrnfZIn1M6B08qSKsC1QcQMQ6f9U/pub?output=csv";

/* CSV parser unchanged */
function parseCSV(text) { /* ... unchanged ... */ }

/* NEW: filter out past matches */
function isFutureMatch(match) {
    const d = parseMatchDate(match["Schedule Date"]);
    if (!d) return false;
    const today = new Date();
    today.setHours(0,0,0,0);
    return d >= today;
}

async function loadAllMatches() {
    const res = await fetch(SHEET_URL);
    const csv = await res.text();
    const rows = parseCSV(csv);

    const fieldNames = rows.map(r => r[0]?.trim()).filter(x => x);
    const matches = [];
    const numMatches = rows[0].length - 1;

    for (let col = 1; col <= numMatches; col++) {
        const match = {};
        for (let row = 0; row < fieldNames.length; row++) {
            const field = fieldNames[row];
            const value = rows[row][col]?.trim();
            if (field && value) match[field] = value;
        }
        if (match["Match ID"]) matches.push(match);
    }

    matches.sort((a, b) =>
        new Date(a["Schedule Date"]) - new Date(b["Schedule Date"])
    );

    /* NEW: remove past matches */
    allMatches = matches.filter(isFutureMatch);

    applyLeagueFilter();
}

function applyLeagueFilter() {
    const league = document.getElementById("leagueSelect").value;

    filteredMatches = allMatches.filter(m => {
        if (league === "all") return true;
        if (league === "40") return m["League"]?.includes("40+");
        if (league === "55") return m["League"]?.includes("55+");
        return true;
    });

    /* NEW: always start at first future match */
    currentIndex = 0;

    loadMatchInfo();
}

function changeLeague() {
    applyLeagueFilter();
}

function prevMatch() {
    if (currentIndex > 0) {
        currentIndex--;
        loadMatchInfo();
    }
}

function nextMatch() {
    if (currentIndex < filteredMatches.length - 1) {
        currentIndex++;
        loadMatchInfo();
    }
}

/* -----------------------------
   MATCH DISPLAY
------------------------------ */

function clearSelectedButtons() {
    document.querySelectorAll('.avail-btn')
        .forEach(b => b.classList.remove('selected'));
}

function parseMatchDate(raw) { /* unchanged */ }
function parseMatchTime(raw) { /* unchanged */ }

function loadMatchInfo() {
    const match = filteredMatches[currentIndex];
    if (!match) return;

    /* Reset UI state */
    clearSelectedButtons();
    document.getElementById("playerNotes").value = "";
    hideMsg();
    hideNoResponseBanner();

    /* Fill match header */
    const d = parseMatchDate(match["Schedule Date"]);
    const dateStr = d
        ? d.toLocaleDateString("en-US", {
              weekday: "short",
              month: "short",
              day: "numeric",
              year: "numeric"
          })
        : match["Schedule Date"] || "—";

    const timeStr = parseMatchTime(match["Schedule Time"]);

    document.getElementById("matchLeaguePill").textContent = match["League"] || "Match";
    document.getElementById("matchDate").textContent = dateStr;
    document.getElementById("matchTime").textContent = timeStr;
    document.getElementById("matchTeams").textContent =
        `${match["Home Team"]} vs ${match["Visiting Team"]}`;
    document.getElementById("matchVenue").innerHTML =
        `📍 ${match["Facility/Match Site"] || "—"}`;
    document.getElementById("matchCounter").textContent =
        `${currentIndex + 1} / ${filteredMatches.length}`;

    localStorage.setItem("selectedMatchId", match["Match ID"]);

    loadPlayerAvailability(match["Match ID"]);
}

/* -----------------------------
   PLAYER AVAILABILITY
------------------------------ */

function showNoResponseBanner() {
    document.getElementById("noResponseBanner").style.display = "block";
}
function hideNoResponseBanner() {
    document.getElementById("noResponseBanner").style.display = "none";
}

function loadPlayerAvailability(matchId) {
    const user = auth.currentUser;
    if (!user) return;

    const email = user.email;

    db.collection("availability")
        .doc(matchId)
        .collection("players")
        .doc(email)
        .get()
        .then(doc => {
            clearSelectedButtons();
            document.getElementById("playerNotes").value = "";
            hideMsg();

            if (!doc.exists) {
                showNoResponseBanner();
                return;
            }

            const data = doc.data();
            const status = data.status || "";
            const notes = data.notes || "";

            document.getElementById("playerNotes").value = notes;

            const labelMap = {
                "Yes": "Yes, I can play",
                "No": "No, I cannot play",
                "Maybe": "Maybe",
                "Maybe - conflict": "Maybe — conflicts with another match"
            };

            const label = labelMap[status];
            if (!label) {
                showNoResponseBanner();
                return;
            }

            document.querySelectorAll('.avail-btn').forEach(b => {
                if (b.textContent.trim().includes(label)) {
                    b.classList.add('selected');
                }
            });
        });
}

function showMsg(text, type) {
    const el = document.getElementById("msg");
    el.textContent = text;
    el.className = type;
    el.style.display = "block";
}

function hideMsg() {
    const el = document.getElementById("msg");
    el.textContent = "";
    el.className = "";
    el.style.display = "none";
}

function setAvailability(status) {
    const user = auth.currentUser;
    if (!user) return;

    const email = user.email;
    const matchId = localStorage.getItem("selectedMatchId");
    const notes = document.getElementById("playerNotes").value.trim();

    if (!matchId) {
        showMsg("Error: No match selected.", "error");
        return;
    }

    db.collection("availability")
        .doc(matchId)
        .collection("players")
        .doc(email)
        .set({
            email: email,
            status: status,
            notes: notes || "",
            timestamp: new Date()
        })
        .then(() => {
            clearSelectedButtons();

            const labelMap = {
                "Yes": "Yes, I can play",
                "No": "No, I cannot play",
                "Maybe": "Maybe",
                "Maybe - conflict": "Maybe — conflicts with another match"
            };

            const label = labelMap[status];

            document.querySelectorAll('.avail-btn').forEach(b => {
                if (b.textContent.trim().includes(label)) {
                    b.classList.add('selected');
                }
            });

            hideNoResponseBanner();
            showMsg("Availability saved! Moving to next match…", "success");

            setTimeout(() => {
                nextMatch();
                document.getElementById("playerNotes").value = "";
                hideMsg();
            }, 800);
        })
        .catch(err => {
            showMsg("Error: " + err.message, "error");
        });
}
</script>

</body>
