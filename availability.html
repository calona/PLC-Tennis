<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Set Availability</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }

    .box {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 6px;
      background: #1d3563;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover { opacity: 0.9; }

    .logout {
      margin-top: 20px;
      background: #8b0000;
    }

    #msg { margin-top: 15px; }
  </style>
</head>

<body>

<div class="box">
  <h2 id="matchTitle">Loading match...</h2>

  <p>Select your availability:</p>

  <button onclick="setAvailability('Yes')">✔ Yes, I can play</button>
  <button onclick="setAvailability('No')" style="background:#555;">✖ No, I cannot play</button>
  <button onclick="setAvailability('Maybe')" style="background:#2a4d8f;">❓ Maybe</button>

  <button class="logout" onclick="logout()">Logout</button>

  <p id="msg"></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBRS15FxZ8ekWvcAluTy2EKUVCMs0gkYPg",
  authDomain: "plc-tennis.firebaseapp.com",
  projectId: "plc-tennis",
  storageBucket: "plc-tennis.appspot.com",
  messagingSenderId: "472563332469",
  appId: "1:472563332469:web:b781075e99cd0f5a3c4f3c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Protect page
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    loadMatchInfo();
  }
});

function logout() {
  auth.signOut().then(() => window.location.href = "login.html");
}

function loadMatchInfo() {
  const matchName = localStorage.getItem("selectedMatchName") || "Match";
  document.getElementById("matchTitle").innerText = matchName;
}

function setAvailability(status) {
  const user = auth.currentUser;
  if (!user) return;

  const email = user.email;
  const matchId = localStorage.getItem("selectedMatchId");

  if (!matchId) {
    document.getElementById("msg").innerText = "Error: No match selected.";
    document.getElementById("msg").style.color = "red";
    return;
  }

  db.collection("availability")
    .doc(matchId)
    .collection("players")
    .doc(email)
    .set({
      email: email,
      status: status,
      timestamp: new Date()
    })
    .then(() => {
      document.getElementById("msg").innerText = "Availability saved!";
      document.getElementById("msg").style.color = "green";
    })
    .catch(err => {
      document.getElementById("msg").innerText = "Error: " + err.message;
      document.getElementById("msg").style.color = "red";
    });
}
</script>

</body>
</html>
