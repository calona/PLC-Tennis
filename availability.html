<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Set Availability — PLC Tennis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #1d3563;
      --navy-soft: #243c6f;
      --blue: #4a6fa5;
      --green: #1d6f42;
      --bg: #f5f7fa;
      --card-bg: #ffffff;
      --text-main: #1f2933;
      --text-muted: #6b7280;
      --border-subtle: #e5e7eb;
      --shadow-soft: 0 10px 25px rgba(15, 23, 42, 0.08);
      --radius-lg: 18px;
      --radius-pill: 999px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top left, #e0ecff 0, var(--bg) 40%, var(--bg) 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    .nav {
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: blur(12px);
      background: linear-gradient(to right, rgba(245,247,250,0.95), rgba(245,247,250,0.9));
      border-bottom: 1px solid rgba(148,163,184,0.25);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto; padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .nav-logo {
      width: 34px; height: 34px; border-radius: 12px;
      background: radial-gradient(circle at 30% 20%, #facc15, #f97316 40%, #b91c1c 100%);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 18px;
      box-shadow: 0 6px 14px rgba(15,23,42,0.25);
    }
    .nav-title { display: flex; flex-direction: column; }
    .nav-title-main { font-family: "Poppins", sans-serif; font-weight: 700; font-size: 18px; color: var(--navy); }
    .nav-title-sub { font-size: 12px; color: var(--text-muted); }
    .nav-links { display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .nav-link {
      padding: 6px 12px; border-radius: var(--radius-pill);
      color: var(--text-muted); text-decoration: none; transition: all 0.2s ease;
    }
    .nav-link:hover { background: rgba(148,163,184,0.12); color: var(--navy); }
    .nav-link.active { background: var(--navy); color: #fff; box-shadow: 0 6px 14px rgba(15,23,42,0.25); }
    .nav-cta {
      padding: 7px 14px; border-radius: var(--radius-pill);
      border: 1px solid rgba(148,163,184,0.5); font-size: 12px;
      color: var(--text-muted); background: rgba(255,255,255,0.8);
      display: flex; align-items: center; gap: 6px; cursor: pointer;
    }
    .nav-cta span { font-size: 16px; }

    /* PAGE */
    .page { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 32px 16px 48px; }
    .page-inner { max-width: 560px; width: 100%; }

    /* CARD */
    .card {
      background: var(--card-bg); border-radius: 22px;
      padding: 28px 26px; box-shadow: var(--shadow-soft);
      border: 1px solid rgba(148,163,184,0.25);
    }

    /* MATCH HEADER */
    .match-header {
      background: linear-gradient(135deg, var(--navy), var(--blue));
      border-radius: 16px; padding: 18px 20px; color: #e5ecff;
      margin-bottom: 20px; position: relative; overflow: hidden;
    }
    .match-header-pill {
      position: absolute; right: -30px; top: -30px;
      width: 100px; height: 100px; border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #facc15, #f97316 40%, #b91c1c 100%);
      opacity: 0.15;
    }
    .match-header h2 {
      font-family: "Poppins", sans-serif; font-weight: 600;
      font-size: 15px; line-height: 1.45; position: relative; z-index: 1;
    }

    /* NAV BUTTONS */
    .match-nav {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .match-nav-btn {
      flex: 1; padding: 10px; border: 1px solid var(--border-subtle);
      border-radius: 12px; background: var(--card-bg);
      font-family: "Inter", sans-serif; font-size: 13px; font-weight: 500;
      color: var(--navy-soft); cursor: pointer;
      transition: all 0.2s ease; text-align: center;
    }
    .match-nav-btn:hover {
      background: rgba(74,111,165,0.06); border-color: var(--blue);
    }

    /* LEAGUE FILTER */
    .filter-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
    }
    .filter-label { font-size: 13px; font-weight: 500; color: var(--navy-soft); }
    .filter-select {
      flex: 1; padding: 10px 14px; font-size: 14px; border-radius: 12px;
      border: 1px solid var(--border-subtle); background: var(--card-bg);
      color: var(--text-main); font-family: "Inter", sans-serif;
      cursor: pointer; outline: none; transition: border-color 0.2s;
    }
    .filter-select:focus { border-color: var(--blue); }

    /* SECTION TITLE */
    .section-label {
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em;
    }

    /* AVAILABILITY BUTTONS */
    .avail-buttons { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
    .avail-btn {
      width: 100%; padding: 13px 16px; border: 2px solid var(--border-subtle);
      border-radius: 14px; background: var(--card-bg);
      font-family: "Inter", sans-serif; font-size: 14px; font-weight: 500;
      color: var(--text-main); cursor: pointer;
      transition: all 0.2s ease; text-align: left;
      display: flex; align-items: center; gap: 10px;
    }
    .avail-btn:hover { border-color: var(--blue); background: rgba(74,111,165,0.04); }
    .avail-btn.selected {
      border-color: var(--navy); background: rgba(29,53,99,0.06);
      box-shadow: 0 0 0 3px rgba(29,53,99,0.12);
    }
    .avail-btn .icon { font-size: 18px; flex-shrink: 0; }
    .avail-btn.yes:hover, .avail-btn.yes.selected { border-color: #22c55e; background: rgba(34,197,94,0.06); }
    .avail-btn.no:hover, .avail-btn.no.selected { border-color: #ef4444; background: rgba(239,68,68,0.06); }
    .avail-btn.maybe:hover, .avail-btn.maybe.selected { border-color: var(--blue); background: rgba(74,111,165,0.06); }
    .avail-btn.conflict:hover, .avail-btn.conflict.selected { border-color: #f59e0b; background: rgba(245,158,11,0.06); }

    /* NOTES */
    .notes-textarea {
      width: 100%; padding: 12px 14px; border-radius: 12px;
      border: 1px solid var(--border-subtle); background: var(--card-bg);
      font-family: "Inter", sans-serif; font-size: 14px;
      color: var(--text-main); resize: vertical; min-height: 70px;
      outline: none; transition: border-color 0.2s; margin-bottom: 18px;
    }
    .notes-textarea:focus { border-color: var(--blue); }

    /* MESSAGE */
    #msg {
      margin-top: 12px; font-size: 13px; font-weight: 500;
      padding: 10px 14px; border-radius: 10px; display: none;
    }
    #msg.success { display: block; background: rgba(34,197,94,0.08); color: #15803d; }
    #msg.error { display: block; background: rgba(239,68,68,0.08); color: #dc2626; }

    /* FOOTER */
    .footer {
      border-top: 1px solid rgba(148,163,184,0.3);
      padding: 10px 16px 14px; font-size: 11px; color: var(--text-muted);
      display: flex; justify-content: center;
    }
    .footer-inner {
      max-width: 1100px; width: 100%;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px;
    }
    .footer-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .footer-link { color: var(--text-muted); text-decoration: none; }
    .footer-link:hover { text-decoration: underline; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .nav-inner { flex-wrap: wrap; }
      .nav-links { width: 100%; justify-content: flex-start; flex-wrap: wrap; }
    }
    @media (max-width: 600px) {
      .card { padding: 20px 16px; }
      .match-header h2 { font-size: 13px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="nav">
    <div class="nav-inner">
      <div class="nav-left">
        <div class="nav-logo">PLC</div>
        <div class="nav-title">
          <div class="nav-title-main">PLC Tennis</div>
          <div class="nav-title-sub">USTA Team Hub · 2026 Season</div>
        </div>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="calendar.html" class="nav-link">Calendar</a>
        <a href="availability.html" class="nav-link active">Availability</a>
        <a href="practice.html" class="nav-link">Practice</a>
        <a href="roster.html" class="nav-link">Roster</a>
        <a href="captain.html" class="nav-link" id="captainNav" style="display:none;">Captain</a>
        <a href="#" class="nav-cta" onclick="logout()"><span>🔒</span> Logout</a>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="page">
    <div class="page-inner">
      <div class="card">

        <!-- Match info header -->
        <div class="match-header">
          <div class="match-header-pill"></div>
          <h2 id="matchTitle">Loading match…</h2>
        </div>

        <!-- Previous / Next -->
        <div class="match-nav">
          <button class="match-nav-btn" onclick="prevMatch()">⬅ Previous</button>
          <button class="match-nav-btn" onclick="nextMatch()">Next ➡</button>
        </div>

        <!-- League filter -->
        <div class="filter-row">
          <span class="filter-label">League:</span>
          <select id="leagueSelect" class="filter-select" onchange="changeLeague()">
            <option value="all">All Leagues</option>
            <option value="40">40+</option>
            <option value="55">55+</option>
          </select>
        </div>

        <!-- Availability buttons -->
        <div class="section-label">Your availability</div>
        <div class="avail-buttons">
          <button class="avail-btn yes" onclick="setAvailability('Yes')">
            <span class="icon">✔</span> Yes, I can play
          </button>
          <button class="avail-btn no" onclick="setAvailability('No')">
            <span class="icon">✖</span> No, I cannot play
          </button>
          <button class="avail-btn maybe" onclick="setAvailability('Maybe')">
            <span class="icon">❓</span> Maybe
          </button>
          <button class="avail-btn conflict" onclick="setAvailability('Maybe - conflict')">
            <span class="icon">⚠</span> Maybe — conflicts with another match
          </button>
        </div>

        <!-- Notes -->
        <div class="section-label">Notes (optional)</div>
        <textarea id="playerNotes" class="notes-textarea" rows="3" placeholder="e.g., 'I can play only after 6pm'"></textarea>

        <div id="msg"></div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <span>&copy; 2026 PLC Tennis Team · Sammamish, WA</span>
      <div class="footer-links">
        <a href="calendar.html" class="footer-link">Calendar</a>
        <a href="availability.html" class="footer-link">Availability</a>
        <a href="practice.html" class="footer-link">Practice</a>
        <a href="roster.html" class="footer-link">Roster</a>
      </div>
    </div>
  </footer>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBRS15FxZ8ekWvcAluTy2EKUVCMs0gkYPg",
      authDomain: "plc-tennis.firebaseapp.com",
      projectId: "plc-tennis",
      storageBucket: "plc-tennis.appspot.com",
      messagingSenderId: "472563332469",
      appId: "1:472563332469:web:b781075e99cd0f5a3c4f3c"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
      if (user && user.email.toLowerCase() === "gaylorde@outlook.com") { var cn = document.getElementById("captainNav"); if(cn) cn.style.display=""; }
      if (!user) { window.location.href = "login.html"; } else { loadAllMatches(); }
    });
    function logout() { auth.signOut().then(() => window.location.href = "login.html"); }

    let allMatches = [], filteredMatches = [], currentIndex = 0;
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-KfGVV4zKjLXTxXpJcaHA7KIjpQGHfMPU6CIgmUYEnh1Aed-bwrnfZIn1M6B08qSKsC1QcQMQ6f9U/pub?output=csv";

    function parseCSV(text) {
      const rows = []; let row = []; let cell = ""; let insideQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i]; const next = text[i + 1];
        if (c === '"' && next === '"') { cell += '"'; i++; }
        else if (c === '"') { insideQuotes = !insideQuotes; }
        else if (c === ',' && !insideQuotes) { row.push(cell); cell = ""; }
        else if (c === '\n' && !insideQuotes) { row.push(cell); rows.push(row); row = []; cell = ""; }
        else { cell += c; }
      }
      row.push(cell); rows.push(row);
      return rows;
    }

    async function loadAllMatches() {
      const res = await fetch(SHEET_URL);
      const csv = await res.text();
      const rows = parseCSV(csv);
      const fieldNames = rows.map(r => r[0]?.trim()).filter(x => x);
      const matches = []; const numMatches = rows[0].length - 1;
      for (let col = 1; col <= numMatches; col++) {
        const match = {};
        for (let row = 0; row < fieldNames.length; row++) {
          const field = fieldNames[row]; const value = rows[row][col]?.trim();
          if (field && value) match[field] = value;
        }
        if (match["Match ID"]) matches.push(match);
      }
      matches.sort((a, b) => new Date(a["Schedule Date"]) - new Date(b["Schedule Date"]));
      allMatches = matches;
      applyLeagueFilter();
    }

    function applyLeagueFilter() {
      const league = document.getElementById("leagueSelect").value;
      filteredMatches = allMatches.filter(m => {
        if (league === "all") return true;
        if (league === "40") return m["League"]?.includes("40+");
        if (league === "55") return m["League"]?.includes("55+");
        return true;
      });
      const currentId = localStorage.getItem("selectedMatchId");
      currentIndex = filteredMatches.findIndex(m => m["Match ID"] === currentId);
      if (currentIndex === -1) currentIndex = 0;
      loadMatchInfo();
    }

    function changeLeague() { applyLeagueFilter(); }
    function prevMatch() { if (currentIndex > 0) { currentIndex--; loadMatchInfo(); } }
    function nextMatch() { if (currentIndex < filteredMatches.length - 1) { currentIndex++; loadMatchInfo(); } }

    function clearSelectedButtons() {
      document.querySelectorAll('.avail-btn').forEach(b => b.classList.remove('selected'));
    }

    function loadMatchInfo() {
      const match = filteredMatches[currentIndex]; if (!match) return;
      const matchName = `${match["League"]} — ${match["Schedule Date"]} ${match["Schedule Time"]} — ${match["Home Team"]} vs ${match["Visiting Team"]} @ ${match["Facility/Match Site"]}`;
      document.getElementById("matchTitle").innerText = matchName;
      localStorage.setItem("selectedMatchId", match["Match ID"]);
      localStorage.setItem("selectedMatchName", matchName);
      loadPlayerAvailability(match["Match ID"]);
    }

    function loadPlayerAvailability(matchId) {
      const user = auth.currentUser; if (!user) return;
      const email = user.email;
      db.collection("availability").doc(matchId).collection("players").doc(email).get().then(doc => {
        clearSelectedButtons();
        document.getElementById("playerNotes").value = "";
        hideMsg();
        if (!doc.exists) return;
        const data = doc.data(); const status = data.status || ""; const notes = data.notes || "";
        document.getElementById("playerNotes").value = notes;
        const labelMap = {
          "Yes": "Yes, I can play",
          "No": "No, I cannot play",
          "Maybe": "Maybe",
          "Maybe - conflict": "Maybe — conflicts with another match"
        };
        const label = labelMap[status]; if (!label) return;
        document.querySelectorAll('.avail-btn').forEach(b => {
          if (b.textContent.trim().includes(label)) { b.classList.add('selected'); }
        });
      });
    }

    function showMsg(text, type) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = type;
    }
    function hideMsg() {
      const el = document.getElementById("msg");
      el.textContent = "";
      el.className = "";
      el.style.display = "none";
    }

    function setAvailability(status) {
      const user = auth.currentUser; if (!user) return;
      const email = user.email;
      const matchId = localStorage.getItem("selectedMatchId");
      const notes = document.getElementById("playerNotes").value.trim();
      if (!matchId) { showMsg("Error: No match selected.", "error"); return; }
      db.collection("availability").doc(matchId).collection("players").doc(email).set({
        email: email, status: status, notes: notes || "", timestamp: new Date()
      }).then(() => {
        clearSelectedButtons();
        const labelMap = {
          "Yes": "Yes, I can play",
          "No": "No, I cannot play",
          "Maybe": "Maybe",
          "Maybe - conflict": "Maybe — conflicts with another match"
        };
        const label = labelMap[status];
        document.querySelectorAll('.avail-btn').forEach(b => {
          if (b.textContent.trim().includes(label)) { b.classList.add('selected'); }
        });
        showMsg("Availability saved! Moving to next match…", "success");
        setTimeout(() => { nextMatch(); document.getElementById("playerNotes").value = ""; hideMsg(); }, 800);
      }).catch(err => { showMsg("Error: " + err.message, "error"); });
    }
  </script>
</body>
</html>
