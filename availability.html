<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Set Availability</title>

  <!-- NAVIGATION CSS -->
  <style>
    body { font-family: Arial; margin: 0; padding: 0; }

    /* Header */
    .header {
      width: 100%;
      background: #1d3563;
      color: white;
      padding: 16px 20px;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    /* Hamburger */
    .hamburger {
      font-size: 26px;
      cursor: pointer;
      margin-right: 20px;
    }

    /* Slide-out menu */
    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      background-color: #1d3563;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
    }

    .sidebar a {
      padding: 12px 24px;
      text-decoration: none;
      font-size: 20px;
      color: white;
      display: block;
    }

    .sidebar a:hover {
      background: #2a4d8f;
    }

    .sidebar-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 30px;
      cursor: pointer;
      color: white;
    }

    /* Page content */
    .content {
      padding: 30px;
    }

    .match-title {
      font-size: 20px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    /* Buttons */
    .btn {
      padding: 12px 20px;
      margin: 10px 10px 10px 0;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      color: white;
    }

    .available { background: #4CAF50; }
    .maybe { background: #FFC107; color: black; }
    .unavailable { background: #F44336; }

    .btn:hover { opacity: 0.85; }
  </style>

  <!-- NAVIGATION JS -->
  <script>
    function openNav() {
      document.getElementById("sidebar").style.width = "260px";
    }
    function closeNav() {
      document.getElementById("sidebar").style.width = "0";
    }
  </script>
</head>

<body>

<!-- SLIDE-OUT SIDEBAR -->
<div id="sidebar" class="sidebar">
  <span class="sidebar-close" onclick="closeNav()">&times;</span>
  <a href="index.html">Home</a>
  <a href="calendar.html">Calendar</a>
  <a href="availability.html">Availability</a>
  <a href="captain.html">Captain Dashboard</a>
</div>

<!-- TOP HEADER -->
<div class="header">
  <span class="hamburger" onclick="openNav()">&#9776;</span>
  PLC Tennis Team
</div>

<div class="content">

<h1>Set Your Availability</h1>

<div id="matchName" class="match-title"></div>

<!-- Availability Buttons -->
<button class="btn available" onclick="submitAvailability('Available')">Available</button>
<button class="btn maybe" onclick="submitAvailability('Maybe')">Maybe</button>
<button class="btn unavailable" onclick="submitAvailability('Unavailable')">Unavailable</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
/* ---------------- FIREBASE CONFIG ---------------- */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "plc-tennis.firebaseapp.com",
  projectId: "plc-tennis",
  storageBucket: "plc-tennis.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ---------------- LOAD MATCH INFO ---------------- */
const matchId = localStorage.getItem("selectedMatchId");
const matchName = localStorage.getItem("selectedMatchName");

document.getElementById("matchName").innerText =
  matchName || "Match Not Found";

/* ---------------- SUBMIT AVAILABILITY ---------------- */
function submitAvailability(status) {
  const player = prompt("Enter your name:");

  if (!player) {
    alert("Name is required.");
    return;
  }

  db.collection("availability").add({
    matchId: matchId,
    matchName: matchName,
    player: player,
    status: status,
    timestamp: firebase.firestore.Timestamp.now()
  })
  .then(() => {
    alert("Availability saved!");
  })
  .catch(err => {
    alert("Error saving availability: " + err);
  });
}
</script>

</body>
</html>
