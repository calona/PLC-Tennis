<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Player Availability</title>
  <style>
    body { font-family: Arial; margin: 40px; background: #f7f7f7; }
    .box { background: white; padding: 25px; border-radius: 8px; max-width: 500px; }
    button { padding: 10px 20px; margin: 10px 5px 0 0; border: none; border-radius: 6px; cursor: pointer; }
    .available { background: #4CAF50; color: white; }
    .maybe { background: #FFC107; color: black; }
    .unavailable { background: #F44336; color: white; }
  </style>
</head>

<body>

<h1>Set Your Availability</h1>

<div class="box">
  <div id="matchLabel"></div>

  <label><strong>Select your name:</strong></label><br><br>
  <select id="playerSelect">
    <option value="">-- Choose Player --</option>
    <option>Player1</option>
    <option>Player2</option>
    <option>Player3</option>
  </select>

  <br><br>
  <strong>Set your availability:</strong><br>

  <button class="available" onclick="setAvailability('Available')">Available</button>
  <button class="maybe" onclick="setAvailability('Maybe')">Maybe</button>
  <button class="unavailable" onclick="setAvailability('Unavailable')">Unavailable</button>

  <div id="statusMessage"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "plc-tennis.firebaseapp.com",
  projectId: "plc-tennis",
  storageBucket: "plc-tennis.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const matchId = localStorage.getItem("selectedMatchId") || "practice";
const matchName = localStorage.getItem("selectedMatchName") || "Practice";

document.getElementById("matchLabel").innerHTML =
  `<strong>Match:</strong> ${matchName}`;

async function setAvailability(status) {
  const player = document.getElementById("playerSelect").value;
  if (!player) {
    document.getElementById("statusMessage").innerText = "Select your name first.";
    return;
  }

  await db.collection("availability").add({
    player,
    matchId,
    status,
    timestamp: new Date()
  });

  document.getElementById("statusMessage").innerText =
    `${player} marked as ${status} for ${matchName}`;
}
</script>

</body>
</html>
