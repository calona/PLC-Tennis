<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Availability</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f7f7f7;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #2a4d8f;
      padding: 15px 25px;
      border-radius: 6px;
      margin-bottom: 30px;
    }

    .logo {
      color: white;
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .nav-links a:hover {
      text-decoration: underline;
    }

    .availability-box {
      background: white;
      padding: 25px;
      border-radius: 8px;
      max-width: 500px;
    }

    button {
      padding: 10px 20px;
      margin: 10px 5px 0 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .available { background: #4CAF50; color: white; }
    .maybe { background: #FFC107; color: black; }
    .unavailable { background: #F44336; color: white; }

    #statusMessage {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo">PLC Tennis</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="calendar.html">Calendar</a></li>
      <li><a href="availability.html">Availability</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <h1>Player Availability</h1>

  <div class="availability-box">
    <label for="playerSelect"><strong>Select your name:</strong></label><br><br>
    <select id="playerSelect">
      <option value="">-- Choose Player --</option>
      <option value="Player1">Player 1</option>
      <option value="Player2">Player 2</option>
      <option value="Player3">Player 3</option>
      <!-- Add more players here -->
    </select>

    <br><br>
    <strong>Set your availability:</strong><br>

    <button class="available" onclick="setAvailability('Available')">Available</button>
    <button class="maybe" onclick="setAvailability('Maybe')">Maybe</button>
    <button class="unavailable" onclick="setAvailability('Unavailable')">Unavailable</button>

    <div id="statusMessage"></div>
  </div>

  <script>
    function setAvailability(status) {
      const player = document.getElementById('playerSelect').value;

      if (!player) {
        document.getElementById('statusMessage').innerText =
          'Please select your name first.';
        return;
      }

      // Placeholder — this is where Firebase will go later
      document.getElementById('statusMessage').innerText =
        player + ' marked as: ' + status;
    }
  </script>

</body>
</html>
