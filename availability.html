<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Set Availability</title>

  <style>
    body { font-family: Arial; padding: 0; margin: 0; background: #f4f4f4; }

    .box {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin-top: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 6px;
      background: #1d3563;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover { opacity: 0.9; }

    .logout {
      margin-top: 20px;
      background: #8b0000;
    }

    #msg { margin-top: 15px; }

    /* Sidebar */
    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      background-color: #1d3563;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
    }

    .sidebar a {
      padding: 12px 24px;
      text-decoration: none;
      font-size: 20px;
      color: white;
      display: block;
    }

    .sidebar a:hover {
      background: #2a4d8f;
    }

    .sidebar-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 30px;
      cursor: pointer;
      color: white;
    }

    /* Header */
    .header {
      width: 100%;
      background: #1d3563;
      color: white;
      padding: 16px 24px;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    .hamburger {
      font-size: 26px;
      cursor: pointer;
      margin-right: 20px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <span class="sidebar-close" onclick="closeNav()">&times;</span>
  <a href="index.html">Home</a>
  <a href="calendar.html">Calendar</a>
  <a href="availability.html">Availability</a>
  <a href="captain.html">Captain Dashboard</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- HEADER -->
<div class="header">
  <span class="hamburger" onclick="openNav()">&#9776;</span>
  PLC Tennis Team
</div>

<div class="box">
  <h2 id="matchTitle">Loading match...</h2>

  <!-- NAVIGATION BUTTONS -->
  <div style="margin-top:15px; margin-bottom:20px;">
    <button onclick="prevMatch()" style="width:48%;">⬅ Previous</button>
    <button onclick="nextMatch()" style="width:48%;">Next ➡</button>
  </div>

  <!-- LEAGUE SELECTOR -->
  <div style="margin-bottom:20px;">
    <label><strong>League:</strong></label><br>
    <select id="leagueSelect" onchange="changeLeague()" style="width:100%; padding:10px; margin-top:8px;">
      <option value="all">All</option>
      <option value="40">40+</option>
      <option value="55">55+</option>
    </select>
  </div>

  <p>Select your availability:</p>

  <button onclick="setAvailability('Yes')">✔ Yes, I can play</button>
  <button onclick="setAvailability('No')" style="background:#555;">✖ No, I cannot play</button>
  <button onclick="setAvailability('Maybe')" style="background:#2a4d8f;">❓ Maybe</button>

  <button class="logout" onclick="logout()">Logout</button>

  <p id="msg"></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
/* -------------------- FIREBASE CONFIG -------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyBRS15FxZ8ekWvcAluTy2EKUVCMs0gkYPg",
  authDomain: "plc-tennis.firebaseapp.com",
  projectId: "plc-tennis",
  storageBucket: "plc-tennis.appspot.com",
  messagingSenderId: "472563332469",
  appId: "1:472563332469:web:b781075e99cd0f5a3c4f3c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* -------------------- SIDEBAR -------------------- */
function openNav() {
  document.getElementById("sidebar").style.width = "260px";
}
function closeNav() {
  document.getElementById("sidebar").style.width = "0";
}

/* -------------------- AUTH PROTECTION -------------------- */
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    loadAllMatches();
  }
});

function logout() {
  auth.signOut().then(() => window.location.href = "login.html");
}

/* -------------------- MATCH LOADING -------------------- */

let allMatches = [];
let filteredMatches = [];
let currentIndex = 0;

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-KfGVV4zKjLXTxXpJcaHA7KIjpQGHfMPU6CIgmUYEnh1Aed-bwrnfZIn1M6B08qSKsC1QcQMQ6f9U/pub?output=csv";

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const next = text[i + 1];

    if (c === '"' && next === '"') {
      cell += '"';
      i++;
    } else if (c === '"') {
      insideQuotes = !insideQuotes;
    } else if (c === ',' && !insideQuotes) {
      row.push(cell);
      cell = "";
    } else if (c === '\n' && !insideQuotes) {
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += c;
    }
  }
  row.push(cell);
  rows.push(row);

  return rows;
}

async function loadAllMatches() {
  const res = await fetch(SHEET_URL);
  const csv = await res.text();
  const rows = parseCSV(csv);

  const fieldNames = rows.map(r => r[0]?.trim()).filter(x => x);

  const matches = [];
  const numMatches = rows[0].length - 1;

  for (let col = 1; col <= numMatches; col++) {
    const match = {};
    for (let row = 0; row < fieldNames.length; row++) {
      const field = fieldNames[row];
      const value = rows[row][col]?.trim();
      if (field && value) match[field] = value;
    }
    if (match["Match ID"]) matches.push(match);
  }

  matches.sort((a, b) => new Date(a["Schedule Date"]) - new Date(b["Schedule Date"]));
  allMatches = matches;

  applyLeagueFilter();
}

function applyLeagueFilter() {
  const league = document.getElementById("leagueSelect").value;

  filteredMatches = allMatches.filter(m => {
    if (league === "all") return true;
    if (league === "40") return m["League"]?.includes("40+");
    if (league === "55") return m["League"]?.includes("55+");
    return true;
  });

  const currentId = localStorage.getItem("selectedMatchId");
  currentIndex = filteredMatches.findIndex(m => m["Match ID"] === currentId);

  if (currentIndex === -1) currentIndex = 0;

  loadMatchInfo();
}

function changeLeague() {
  applyLeagueFilter();
}

function prevMatch() {
  if (currentIndex > 0) {
    currentIndex--;
    loadMatchInfo();
  }
}

function nextMatch() {
  if (currentIndex < filteredMatches.length - 1) {
    currentIndex++;
    loadMatchInfo();
  }
}

function loadMatchInfo() {
  const match = filteredMatches[currentIndex];
  if (!match) return;

  const matchName =
    `${match["League"]} — ${match["Schedule Date"]} ${match["Schedule Time"]} — ` +
    `${match["Home Team"]} vs ${match["Visiting Team"]} @ ${match["Facility/Match Site"]}`;

  document.getElementById("matchTitle").innerText = matchName;

  localStorage.setItem("selectedMatchId", match["Match ID"]);
  localStorage.setItem("selectedMatchName", matchName);
}

/* -------------------- SAVE AVAILABILITY -------------------- */

function setAvailability(status) {
  const user = auth.currentUser;
  if (!user) return;

  const email = user.email;
  const matchId = localStorage.getItem("selectedMatchId");

  if (!matchId) {
    document.getElementById("msg").innerText = "Error: No match selected.";
    document.getElementById("msg").style.color = "red";
    return;
  }

  db.collection("availability")
    .doc(matchId)
    .collection("players")
    .doc(email)
    .set({
      email: email,
      status: status,
      timestamp: new Date()
    })
    .then(() => {
      document.getElementById("msg").innerText = "Availability saved!";
      document.getElementById("msg").style.color = "green";
    })
    .catch(err => {
      document.getElementById("msg").innerText = "Error: " + err.message;
      document.getElementById("msg").style.color = "red";
    });
}
</script>

</body>
</html>
