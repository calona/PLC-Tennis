

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Match Calendar</title>

  <style>
    body { font-family: Arial; margin: 0; padding: 0; background: #f4f4f4; }

    /* HEADER */
    .header {
      width: 100%;
      background: #1d3563;
      color: white;
      padding: 16px 24px;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    .hamburger {
      font-size: 26px;
      cursor: pointer;
      margin-right: 20px;
    }

    /* SIDEBAR */
    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      background-color: #1d3563;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
    }

    .sidebar a {
      padding: 12px 24px;
      text-decoration: none;
      font-size: 20px;
      color: white;
      display: block;
    }

    .sidebar a:hover {
      background: #2a4d8f;
    }

    .sidebar-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 30px;
      cursor: pointer;
      color: white;
    }

    /* CONTENT */
    .container {
      padding: 20px;
    }

    /* MONTH HEADER */
    .month-title {
      font-size: 26px;
      font-weight: bold;
      margin-top: 40px;
      margin-bottom: 10px;
      color: #1d3563;
    }

    /* CALENDAR GRID */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 40px;
    }

    .day-header {
      font-weight: bold;
      text-align: center;
      padding: 8px 0;
      background: #e8e8e8;
      border-radius: 4px;
    }

    .day-cell {
      background: white;
      min-height: 120px;
      padding: 6px;
      border-radius: 6px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
      font-size: 14px;
      position: relative;
    }

    .day-number {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .match-entry {
      margin-top: 4px;
      padding: 4px;
      background: #f7f7f7;
      border-radius: 4px;
      font-size: 13px;
    }

    .status-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
      color: white;
      margin-top: 2px;
    }

    .yes { background: #2ecc71; }
    .no { background: #e74c3c; }
    .maybe { background: #f1c40f; color: black; }
    .conflict { background: #d35400; }

    .my-note {
      font-size: 11px;
      color: #444;
      margin-top: 2px;
      padding-left: 6px;
      border-left: 2px solid #ccc;
    }

    .respond-btn {
      margin-top: 4px;
      padding: 4px 8px;
      background: #1d3563;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    select {
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
      width: 200px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <span class="sidebar-close" onclick="closeNav()">&times;</span>
  <a href="index.html">Home</a>
  <a href="calendar.html">Calendar</a>
  <a href="availability.html">Availability</a>
  <a href="captain.html">Captain Dashboard</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- HEADER -->
<div class="header">
  <span class="hamburger" onclick="openNav()">&#9776;</span>
  PLC Tennis Team — Match Calendar
</div>

<div class="container">

  <!-- LEAGUE FILTER -->
  <label><strong>League:</strong></label><br>
  <select id="leagueSelect" onchange="renderFilteredMatches()">
    <option value="all">All</option>
    <option value="40">40+</option>
    <option value="55">55+</option>
  </select>

  <div id="calendarContainer">Loading...</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
/* -------------------- FIREBASE CONFIG -------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyBRS15FxZ8ekWvcAluTy2EKUVCMs0gkYPg",
  authDomain: "plc-tennis.firebaseapp.com",
  projectId: "plc-tennis",
  storageBucket: "plc-tennis.appspot.com",
  messagingSenderId: "472563332469",
  appId: "1:472563332469:web:b781075e99cd0f5a3c4f3c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* -------------------- SIDEBAR -------------------- */
function openNav() {
  document.getElementById("sidebar").style.width = "260px";
}
function closeNav() {
  document.getElementById("sidebar").style.width = "0";
}

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  loadMatches();
});

function logout() {
  auth.signOut().then(() => window.location.href = "login.html");
}

/* -------------------- GOOGLE SHEET LOADING -------------------- */

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-KfGVV4zKjLXTxXpJcaHA7KIjpQGHfMPU6CIgmUYEnh1Aed-bwrnfZIn1M6B08qSKsC1QcQMQ6f9U/pub?output=csv";

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const next = text[i + 1];

    if (c === '"' && next === '"') {
      cell += '"';
      i++;
    } else if (c === '"') {
      insideQuotes = !insideQuotes;
    } else if (c === ',' && !insideQuotes) {
      row.push(cell);
      cell = "";
    } else if (c === '\n' && !insideQuotes) {
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += c;
    }
  }
  row.push(cell);
  rows.push(row);

  return rows;
}

let allMatches = [];

async function loadMatches() {
  const res = await fetch(SHEET_URL);
  const csv = await res.text();
  const rows = parseCSV(csv);

  const fieldNames = rows.map(r => r[0]?.trim()).filter(x => x);

  const matches = [];
  const numMatches = rows[0].length - 1;

  for (let col = 1; col <= numMatches; col++) {
    const match = {};
    for (let row = 0; row < fieldNames.length; row++) {
      const field = fieldNames[row];
      const value = rows[row][col]?.trim();
      if (field && value) match[field] = value;
    }
    if (match["Match ID"]) matches.push(match);
  }

  matches.sort((a, b) => new Date(a["Schedule Date"]) - new Date(b["Schedule Date"]));

  allMatches = matches;
  renderFilteredMatches();
}

/* -------------------- FILTER + RENDER -------------------- */

function renderFilteredMatches() {
  const league = document.getElementById("leagueSelect").value;

  const filtered = allMatches.filter(m => {
    if (league === "all") return true;
    if (league === "40") return m["League"]?.includes("40+");
    if (league === "55") return m["League"]?.includes("55+");
    return true;
  });

  renderCalendar(filtered);
}

/* -------------------- LOAD ONLY MY AVAILABILITY -------------------- */

function loadMyAvailability(matchId) {
  const user = firebase.auth().currentUser;
  if (!user) return Promise.resolve(null);

  return db.collection("availability")
    .doc(matchId)
    .collection("players")
    .doc(user.email)
    .get()
    .then(doc => doc.exists ? doc.data() : null);
}

/* -------------------- RENDER TRUE MONTHLY CALENDAR -------------------- */

async function renderCalendar(matches) {
  const container = document.getElementById("calendarContainer");
  container.innerHTML = "";

  if (matches.length === 0) {
    container.innerHTML = "<p>No matches found.</p>";
    return;
  }

  // Group matches by month
  const months = {};
  for (const match of matches) {
    const date = new Date(match["Schedule Date"]);
    const key = `${date.getFullYear()}-${date.getMonth()}`;
    if (!months[key]) months[key] = [];
    months[key].push(match);
  }

  // Render each month
  for (const key of Object.keys(months)) {
    const [year, month] = key.split("-").map(Number);
    const monthMatches = months[key];

    const monthName = new Date(year, month).toLocaleString("default", { month: "long" });

    // Month title
    const title = document.createElement("div");
    title.className = "month-title";
    title.innerText = `${monthName} ${year}`;
    container.appendChild(title);

    // Day headers
    const grid = document.createElement("div");
    grid.className = "calendar-grid";

    const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    days.forEach(d => {
      const h = document.createElement("div");
      h.className = "day-header";
      h.innerText = d;
      grid.appendChild(h);
    });

    // First day offset
    const firstDay = new Date(year, month, 1).getDay();
    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement("div");
      grid.appendChild(empty);
    }

    // Days in month
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let day = 1; day <= daysInMonth; day++) {
      const cell = document.createElement("div");
      cell.className = "day-cell";

      const num = document.createElement("div");
      num.className = "day-number";
      num.innerText = day;
      cell.appendChild(num);

      // Matches on this day
      const todaysMatches = monthMatches.filter(m => {
        const d = new Date(m["Schedule Date"]);
        return d.getDate() === day;
      });

      for (const match of todaysMatches) {
        const entry = document.createElement("div");
        entry.className = "match-entry";

        const matchId = match["Match ID"];
        const matchLabel =
          `${match["League"]} — ${match["Schedule Time"]} — ` +
          `${match["Home Team"]} vs ${match["Visiting Team"]}`;

        entry.innerHTML = `<strong>${matchLabel}</strong>`;

        // Load personal availability
        loadMyAvailability(matchId).then(data => {
          if (!data) {
            entry.innerHTML += `<div><em>No response yet</em></div>`;
            return;
          }

          const status = data.status;
          const notes = data.notes || "";

          const pillClass =
            status === "Yes" ? "yes" :
            status === "No" ? "no" :
            status === "Maybe" ? "maybe" :
            "conflict";

          entry.innerHTML += `
            <div class="status-pill ${pillClass}">${status}</div>
            ${notes ? `<div class="my-note">${notes}</div>` : ""}
            <button class="respond-btn" onclick="window.location.href='availability.html'">
              Update
            </button>
          `;
        });

        cell.appendChild(entry);
      }

      grid.appendChild(cell);
    }

    container.appendChild(grid);
  }
}
</script>

</body>
</html>
