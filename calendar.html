<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Match Calendar</title>

  <style>
    body { font-family: Arial; margin: 0; padding: 0; background: #f4f4f4; }

    /* HEADER */
    .header {
      width: 100%;
      background: #1d3563;
      color: white;
      padding: 16px 24px;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    .hamburger {
      font-size: 26px;
      cursor: pointer;
      margin-right: 20px;
    }

    /* SIDEBAR */
    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      background-color: #1d3563;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
    }

    .sidebar a {
      padding: 12px 24px;
      text-decoration: none;
      font-size: 20px;
      color: white;
      display: block;
    }

    .sidebar a:hover {
      background: #2a4d8f;
    }

    .sidebar-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 30px;
      cursor: pointer;
      color: white;
    }

    /* CONTENT */
    .container {
      padding: 20px;
    }

    .view-toggle {
      margin-bottom: 20px;
    }

    .view-toggle button {
      padding: 10px 16px;
      margin-right: 10px;
      border: none;
      border-radius: 6px;
      background: #1d3563;
      color: white;
      cursor: pointer;
    }

    .match-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .upcoming {
      border-left: 6px solid #2ecc71;
    }

    .my-note {
      margin-top: 6px;
      font-size: 13px;
      color: #444;
      padding-left: 10px;
      border-left: 3px solid #ccc;
    }

    .respond-btn {
      margin-top: 10px;
      padding: 8px 14px;
      background: #1d3563;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .status-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
      color: white;
      margin-top: 6px;
    }

    .yes { background: #2ecc71; }
    .no { background: #e74c3c; }
    .maybe { background: #f1c40f; color: black; }
    .conflict { background: #d35400; }

    select {
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
      width: 200px;
    }

    /* CALENDAR GRID */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <span class="sidebar-close" onclick="closeNav()">&times;</span>
  <a href="index.html">Home</a>
  <a href="calendar.html">Calendar</a>
  <a href="availability.html">Availability</a>
  <a href="captain.html">Captain Dashboard</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- HEADER -->
<div class="header">
  <span class="hamburger" onclick="openNav()">&#9776;</span>
  PLC Tennis Team — Match Calendar
</div>

<div class="container">

  <!-- VIEW TOGGLE -->
  <div class="view-toggle">
    <button onclick="setView('list')">List View</button>
    <button onclick="setView('grid')">Calendar Grid View</button>
  </div>

  <!-- LEAGUE FILTER -->
  <label><strong>League:</strong></label><br>
  <select id="leagueSelect" onchange="renderFilteredMatches()">
    <option value="all">All</option>
    <option value="40">40+</option>
    <option value="55">55+</option>
  </select>

  <div id="matchesContainer">Loading...</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
/* -------------------- FIREBASE CONFIG -------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyBRS15FxZ8ekWvcAluTy2EKUVCMs0gkYPg",
  authDomain: "plc-tennis.firebaseapp.com",
  projectId: "plc-tennis",
  storageBucket: "plc-tennis.appspot.com",
  messagingSenderId: "472563332469",
  appId: "1:472563332469:web:b781075e99cd0f5a3c4f3c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* -------------------- SIDEBAR -------------------- */
function openNav() {
  document.getElementById("sidebar").style.width = "260px";
}
function closeNav() {
  document.getElementById("sidebar").style.width = "0";
}

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  loadMatches();
});

function logout() {
  auth.signOut().then(() => window.location.href = "login.html");
}

/* -------------------- GOOGLE SHEET LOADING -------------------- */

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-KfGVV4zKjLXTxXpJcaHA7KIjpQGHfMPU6CIgmUYEnh1Aed-bwrnfZIn1M6B08qSKsC1QcQMQ6f9U/pub?output=csv";

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const next = text[i + 1];

    if (c === '"' && next === '"') {
      cell += '"';
      i++;
    } else if (c === '"') {
      insideQuotes = !insideQuotes;
    } else if (c === ',' && !insideQuotes) {
      row.push(cell);
      cell = "";
    } else if (c === '\n' && !insideQuotes) {
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += c;
    }
  }
  row.push(cell);
  rows.push(row);

  return rows;
}

let allMatches = [];
let currentView = "list";

function setView(view) {
  currentView = view;
  renderFilteredMatches();
}

async function loadMatches() {
  const res = await fetch(SHEET_URL);
  const csv = await res.text();
  const rows = parseCSV(csv);

  const fieldNames = rows.map(r => r[0]?.trim()).filter(x => x);

  const matches = [];
  const numMatches = rows[0].length - 1;

  for (let col = 1; col <= numMatches; col++) {
    const match = {};
    for (let row = 0; row < fieldNames.length; row++) {
      const field = fieldNames[row];
      const value = rows[row][col]?.trim();
      if (field && value) match[field] = value;
    }
    if (match["Match ID"]) matches.push(match);
  }

  matches.sort((a, b) => new Date(a["Schedule Date"]) - new Date(b["Schedule Date"]));

  allMatches = matches;
  renderFilteredMatches();
}

/* -------------------- FILTER + RENDER -------------------- */

function renderFilteredMatches() {
  const league = document.getElementById("leagueSelect").value;

  const filtered = allMatches.filter(m => {
    if (league === "all") return true;
    if (league === "40") return m["League"]?.includes("40+");
    if (league === "55") return m["League"]?.includes("55+");
    return true;
  });

  renderMatches(filtered);
}

/* -------------------- LOAD ONLY MY AVAILABILITY -------------------- */

function loadMyAvailability(matchId, callback) {
  const user = firebase.auth().currentUser;
  if (!user) {
    callback(null);
    return;
  }

  db.collection("availability")
    .doc(matchId)
    .collection("players")
    .doc(user.email)
    .get()
    .then(doc => {
      if (!doc.exists) callback(null);
      else callback(doc.data());
    });
}

/* -------------------- RENDER MATCHES -------------------- */

async function renderMatches(matches) {
  const container = document.getElementById("matchesContainer");
  container.innerHTML = "";

  if (currentView === "grid") {
    container.className = "calendar-grid";
  } else {
    container.className = "";
  }

  const today = new Date();

  for (const match of matches) {
    const matchId = match["Match ID"];
    const matchDate = new Date(match["Schedule Date"]);
    const isUpcoming = matchDate >= today;

    const matchName =
      `${match["League"]} — ${match["Schedule Date"]} ${match["Schedule Time"]} — ` +
      `${match["Home Team"]} vs ${match["Visiting Team"]}`;

    const card = document.createElement("div");
    card.className = "match-card";
    if (isUpcoming) card.classList.add("upcoming");

    card.innerHTML = `
      <h3>${matchName}</h3>
      <p><strong>Location:</strong> ${match["Facility/Match Site"]}</p>
      <div id="my-${matchId}">Loading your availability...</div>
      <button class="respond-btn" onclick="window.location.href='availability.html'">
        Respond Now
      </button>
    `;

    container.appendChild(card);

    loadMyAvailability(matchId, (data) => {
      const box = document.getElementById(`my-${matchId}`);

      if (!data) {
        box.innerHTML = `<em>No response yet</em>`;
        return;
      }

      const status = data.status;
      const notes = data.notes || "";

      const pillClass =
        status === "Yes" ? "yes" :
        status === "No" ? "no" :
        status === "Maybe" ? "maybe" :
        "conflict";

      box.innerHTML = `
        <span class="status-pill ${pillClass}">${status}</span>
        ${notes ? `<div class="my-note">${notes}</div>` : ""}
      `;
    });
  }
}
</script>

</body>
</html>
