<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Match Calendar</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    .match { padding: 12px; background: #eee; margin: 10px 0; border-radius: 6px; cursor: pointer; }
    .match:hover { background: #ddd; }
  </style>
</head>

<body>

<h1>Match Calendar</h1>
<div id="matchList">Loading matches...</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-KfGVV4zKjLXTxXpJcaHA7KIjpQGHfMPU6CIgmUYEnh1Aed-bwrnfZIn1M6B08qSKsC1QcQMQ6f9U/pub?output=csv";

async function loadMatches() {
  const res = await fetch(SHEET_URL);
  const csv = await res.text();
  const rows = csv.split("\n").map(r => r.split(","));

  const headers = rows[2].map(h => h.trim());
  const dataRows = rows.slice(3);

  return dataRows.map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });
}

loadMatches().then(matches => {
  const list = document.getElementById("matchList");
  list.innerHTML = "";

  matches.forEach(m => {
    if (!m["Match #"]) return;

    const div = document.createElement("div");
    div.className = "match";
    div.dataset.matchId = m["Match #"];

    div.innerHTML = `
      <strong>${m["Team"]} Match ${m["Match #"]}</strong><br>
      ${m["Date"]} — ${m["Home/Away"]} vs ${m["Opponent"]}
    `;

    div.onclick = () => {
      localStorage.setItem("selectedMatchId", m["Match #"]);
      localStorage.setItem("selectedMatchName",
        `${m["Team"]} Match ${m["Match #"]} — ${m["Date"]} — ${m["Home/Away"]} vs ${m["Opponent"]}`
      );
      window.location.href = "availability.html";
    };

    list.appendChild(div);
  });
});
</script>

</body>
</html>
