<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Match Calendar</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    .match { padding: 12px; background: #eee; margin: 10px 0; border-radius: 6px; cursor: pointer; }
    .match:hover { background: #ddd; }
  </style>
</head>

<body>

<h1>Match Calendar</h1>
<div id="matchList">Loading matches...</div>

<script>
const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-KfGVV4zKjLXTxXpJcaHA7KIjpQGHfMPU6CIgmUYEnh1Aed-bwrnfZIn1M6B08qSKsC1QcQMQ6f9U/pub?output=csv";

async function loadMatches() {
  const res = await fetch(SHEET_URL);
  const csv = await res.text();
  const rows = csv.split("\n").map(r => r.split(","));

  // Column A = field names
  const fieldNames = rows.map(r => r[0]?.trim()).filter(x => x);

  // Columns B+ = matches
  const matches = [];

  const numMatches = rows[0].length - 1;

  for (let col = 1; col <= numMatches; col++) {
    const match = {};
    for (let row = 0; row < fieldNames.length; row++) {
      const field = fieldNames[row];
      const value = rows[row][col]?.trim();
      if (field && value) match[field] = value;
    }
    if (match["Match #"]) matches.push(match);
  }

  return matches;
}

loadMatches().then(matches => {
  const list = document.getElementById("matchList");
  list.innerHTML = "";

  matches.forEach(m => {
    const div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
      <strong>${m["Team"]} Match ${m["Match #"]}</strong><br>
      ${m["Date"]} — ${m["Home/Away"]} vs ${m["Opponent"]}
    `;

    div.onclick = () => {
      localStorage.setItem("selectedMatchId", m["Match #"]);
      localStorage.setItem(
        "selectedMatchName",
        `${m["Team"]} Match ${m["Match #"]} — ${m["Date"]} — ${m["Home/Away"]} vs ${m["Opponent"]}`
      );
      window.location.href = "availability.html";
    };

    list.appendChild(div);
  });
});
</script>

</body>
</html>
