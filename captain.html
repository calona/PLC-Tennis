<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Captain Dashboard — PLC Tennis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <style>
    :root {
      --navy: #1d3563;
      --navy-soft: #243c6f;
      --blue: #4a6fa5;
      --green: #1d6f42;
      --bg: #f5f7fa;
      --card-bg: #ffffff;
      --text-main: #1f2933;
      --text-muted: #6b7280;
      --border-subtle: #e5e7eb;
      --shadow-soft: 0 10px 25px rgba(15, 23, 42, 0.08);
      --radius-lg: 18px;
      --radius-pill: 999px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top left, #e0ecff 0, var(--bg) 40%, var(--bg) 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    .nav {
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: blur(12px);
      background: linear-gradient(to right, rgba(245,247,250,0.95), rgba(245,247,250,0.9));
      border-bottom: 1px solid rgba(148,163,184,0.25);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto; padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .nav-logo {
      width: 34px; height: 34px; border-radius: 12px;
      background: radial-gradient(circle at 30% 20%, #facc15, #f97316 40%, #b91c1c 100%);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 18px;
      box-shadow: 0 6px 14px rgba(15,23,42,0.25);
    }
    .nav-title { display: flex; flex-direction: column; }
    .nav-title-main { font-family: "Poppins", sans-serif; font-weight: 700; font-size: 18px; color: var(--navy); }
    .nav-title-sub { font-size: 12px; color: var(--text-muted); }
    .nav-links { display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .nav-link {
      padding: 6px 12px; border-radius: var(--radius-pill);
      color: var(--text-muted); text-decoration: none; transition: all 0.2s ease;
    }
    .nav-link:hover { background: rgba(148,163,184,0.12); color: var(--navy); }
    .nav-link.active { background: var(--navy); color: #fff; box-shadow: 0 6px 14px rgba(15,23,42,0.25); }
    .nav-cta {
      padding: 7px 14px; border-radius: var(--radius-pill);
      border: 1px solid rgba(148,163,184,0.5); font-size: 12px;
      color: var(--text-muted); background: rgba(255,255,255,0.8);
      display: flex; align-items: center; gap: 6px; cursor: pointer;
    }
    .nav-cta span { font-size: 16px; }

    /* PAGE */
    .page { flex: 1; display: flex; justify-content: center; padding: 24px 16px 32px; }
    .page-inner { max-width: 1100px; width: 100%; }

    /* CARD */
    .card {
      background: var(--card-bg); border-radius: 22px;
      padding: 22px 24px; box-shadow: var(--shadow-soft);
      border: 1px solid rgba(148,163,184,0.25);
    }

    /* PAGE HEADER */
    .page-header {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 16px; margin-bottom: 22px;
    }
    .page-header-text h1 {
      font-family: "Poppins", sans-serif; font-weight: 700;
      font-size: 24px; color: var(--navy); margin-bottom: 4px;
    }
    .page-header-text p { font-size: 13px; color: var(--text-muted); }

    /* EXCEL BUTTON */
    .excel-btn {
      background: var(--green); color: white;
      padding: 11px 22px; border: none; border-radius: var(--radius-pill);
      cursor: pointer; font-size: 14px; font-weight: 600;
      font-family: "Inter", sans-serif;
      display: inline-flex; align-items: center; gap: 10px;
      transition: all 0.25s ease;
      box-shadow: 0 8px 18px rgba(29,111,66,0.3);
    }
    .excel-btn:hover {
      background: #145a33; transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(29,111,66,0.4);
    }
    .excel-icon { width: 18px; height: 18px; filter: brightness(0) invert(1); }

    /* MATCH SELECT */
    .controls-row {
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap; margin-bottom: 20px;
    }
    .controls-label { font-size: 14px; font-weight: 600; color: var(--navy-soft); }
    .match-select {
      flex: 1; min-width: 200px; padding: 10px 14px; font-size: 14px;
      border-radius: 12px; border: 1px solid var(--border-subtle);
      background: var(--card-bg); color: var(--text-main);
      font-family: "Inter", sans-serif; cursor: pointer;
      outline: none; transition: border-color 0.2s;
    }
    .match-select:focus { border-color: var(--blue); }

    /* TABLE */
    .table-wrap {
      overflow-x: auto; border-radius: 14px;
      border: 1px solid rgba(148,163,184,0.2);
    }
    table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    th, td {
      padding: 12px 16px; text-align: left;
      border-bottom: 1px solid rgba(148,163,184,0.15);
    }
    th {
      background: var(--navy); color: #fff; font-weight: 600;
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
      position: sticky; top: 0;
    }
    td { color: var(--text-main); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(74,111,165,0.04); }

    .status-Yes { background: rgba(34,197,94,0.12); }
    .status-No { background: rgba(239,68,68,0.12); }
    .status-Maybe { background: rgba(234,179,8,0.12); }
    .status-Conflict { background: rgba(249,115,22,0.12); }
    .status-Blank { background: rgba(148,163,184,0.08); }

    .totals-row { background: rgba(74,111,165,0.06); font-weight: 600; }

    /* STATUS BADGE */
    .status-badge {
      display: inline-block; padding: 3px 12px; border-radius: var(--radius-pill);
      font-size: 11px; font-weight: 600;
    }
    .badge-yes { background: rgba(34,197,94,0.15); color: #15803d; }
    .badge-no { background: rgba(239,68,68,0.15); color: #dc2626; }
    .badge-maybe { background: rgba(234,179,8,0.15); color: #a16207; }
    .badge-conflict { background: rgba(249,115,22,0.15); color: #c2410c; }
    .badge-blank { background: rgba(148,163,184,0.15); color: var(--text-muted); }

    /* FOOTER */
    .footer {
      border-top: 1px solid rgba(148,163,184,0.3);
      padding: 10px 16px 14px; font-size: 11px; color: var(--text-muted);
      display: flex; justify-content: center;
    }
    .footer-inner {
      max-width: 1100px; width: 100%;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px;
    }
    .footer-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .footer-link { color: var(--text-muted); text-decoration: none; }
    .footer-link:hover { text-decoration: underline; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .nav-inner { flex-wrap: wrap; }
      .nav-links { width: 100%; justify-content: flex-start; flex-wrap: wrap; }
    }
    @media (max-width: 600px) {
      .page-header { flex-direction: column; align-items: flex-start; }
      .card { padding: 16px 14px; }
      th, td { padding: 8px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="nav">
    <div class="nav-inner">
      <div class="nav-left">
        <div class="nav-logo">PLC</div>
        <div class="nav-title">
          <div class="nav-title-main">PLC Tennis</div>
          <div class="nav-title-sub">USTA Team Hub · 2026 Season</div>
        </div>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="calendar.html" class="nav-link">Calendar</a>
        <a href="availability.html" class="nav-link">Availability</a>
        <a href="captain.html" class="nav-link active">Captain Dashboard</a>
        <button class="nav-cta" type="button"><span>🎾</span> Match day ready</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="page">
    <div class="page-inner">
      <div class="card">
        <div class="page-header">
          <div class="page-header-text">
            <h1>📊 Captain Dashboard</h1>
            <p>View player availability responses and export the team matrix to Excel.</p>
          </div>
          <button class="excel-btn" onclick="exportTeamAvailabilityMatrix()">
            <img class="excel-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Microsoft_Office_Excel_%282019%E2%80%93present%29.svg" />
            Export Team Availability
          </button>
        </div>

        <div class="controls-row">
          <span class="controls-label">Select Match:</span>
          <select id="matchSelect" class="match-select" onchange="loadMatchAvailability()"></select>
        </div>

        <div class="table-wrap">
          <table id="availabilityTable"></table>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <span>&copy; 2026 PLC Tennis Team · Sammamish, WA</span>
      <div class="footer-links">
        <a href="calendar.html" class="footer-link">Calendar</a>
        <a href="availability.html" class="footer-link">Availability</a>
        <a href="captain.html" class="footer-link">Captain Dashboard</a>
      </div>
    </div>
  </footer>

  <script>
    /* Firebase */
    const firebaseConfig = {
      apiKey: "AIzaSyBRS15FxZ8ekWvcAluTy2EKUVCMs0gkYPg",
      authDomain: "plc-tennis.firebaseapp.com",
      projectId: "plc-tennis",
      storageBucket: "plc-tennis.appspot.com",
      messagingSenderId: "472563332469",
      appId: "1:472563332469:web:b781075e99cd0f5a3c4f3c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    /* Load Matches */
    let allMatches = [];

    async function loadMatches() {
      const sheetUrl =
        "https://docs.google.com/spreadsheets/d/1Cm3hNVLPbLseLLYZKXj3ld1pLNdU1LHNj0f9uKCK4rY/gviz/tq?tqx=out:json";

      const res = await fetch(sheetUrl);
      const text = await res.text();
      const json = JSON.parse(text.substring(47, text.length - 2));

      allMatches = json.table.rows.map((r) => ({
        "Match ID": r.c[0]?.v,
        "League": r.c[1]?.v,
        "Schedule Date": r.c[2]?.v,
        "Schedule Time": r.c[3]?.v,
        "Home Team": r.c[4]?.v,
        "Visiting Team": r.c[5]?.v,
      }));

      const select = document.getElementById("matchSelect");
      allMatches.forEach((m) => {
        const opt = document.createElement("option");
        opt.value = m["Match ID"];
        opt.textContent = `${m["Match ID"]} — ${m["Schedule Date"]} ${m["Schedule Time"]}`;
        select.appendChild(opt);
      });

      loadMatchAvailability();
    }

    loadMatches();

    /* Load Availability */
    async function loadMatchAvailability() {
      const matchId = document.getElementById("matchSelect").value;
      const table = document.getElementById("availabilityTable");

      const snapshot = await db
        .collection("availability")
        .doc(matchId)
        .collection("players")
        .get();

      let rows = [];
      snapshot.forEach((doc) => {
        rows.push({ player: doc.id, status: doc.data().status });
      });

      rows.sort((a, b) => a.player.localeCompare(b.player));

      let html = `
        <tr>
          <th>Player</th>
          <th>Status</th>
        </tr>
      `;

      rows.forEach((r) => {
        const css = r.status ? `status-${r.status}` : "status-Blank";
        const badgeClass = r.status === "Yes" ? "badge-yes" : r.status === "No" ? "badge-no" : r.status === "Maybe" ? "badge-maybe" : r.status === "Conflict" ? "badge-conflict" : "badge-blank";
        html += `
          <tr class="${css}">
            <td>${r.player}</td>
            <td><span class="status-badge ${badgeClass}">${r.status || "No response"}</span></td>
          </tr>
        `;
      });

      table.innerHTML = html;
    }

    /* Export */
    async function exportTeamAvailabilityMatrix() {
      const sortedMatches = [...allMatches].sort(
        (a, b) => new Date(a["Schedule Date"]) - new Date(b["Schedule Date"])
      );

      const matchIds = sortedMatches.map((m) => m["Match ID"]);

      const players = new Set();
      for (const matchId of matchIds) {
        const snapshot = await db
          .collection("availability")
          .doc(matchId)
          .collection("players")
          .get();
        snapshot.forEach((doc) => players.add(doc.id));
      }
      const playerList = Array.from(players).sort();

      const matrix = [];
      matrix.push(["Player", ...matchIds]);

      const metaRows = [
        ["League", ...sortedMatches.map((m) => m["League"])],
        ["Date", ...sortedMatches.map((m) => m["Schedule Date"])],
        ["Time", ...sortedMatches.map((m) => m["Schedule Time"])],
        ["Home Team", ...sortedMatches.map((m) => m["Home Team"])],
        ["Visiting Team", ...sortedMatches.map((m) => m["Visiting Team"])],
      ];
      metaRows.forEach((r) => matrix.push(r));

      for (const player of playerList) {
        const row = [player];
        for (const matchId of matchIds) {
          const doc = await db
            .collection("availability")
            .doc(matchId)
            .collection("players")
            .doc(player)
            .get();
          row.push(doc.exists ? doc.data().status : "");
        }
        matrix.push(row);
      }

      matrix.push([""]); // blank row

      const totals = {
        "Responses": [],
        "Yes": [],
        "No": [],
        "Maybe": [],
        "Conflict": [],
        "No Response": [],
      };

      for (const matchId of matchIds) {
        const snapshot = await db
          .collection("availability")
          .doc(matchId)
          .collection("players")
          .get();

        let yes = 0, no = 0, maybe = 0, conflict = 0, blank = 0;

        snapshot.forEach((doc) => {
          const status = doc.data().status;
          if (status === "Yes") yes++;
          else if (status === "No") no++;
          else if (status === "Maybe") maybe++;
          else if (status === "Conflict") conflict++;
          else blank++;
        });

        const totalPlayers = playerList.length;
        const responses = yes + no + maybe + conflict;

        totals["Responses"].push(`${responses}/${totalPlayers}`);
        totals["Yes"].push(yes);
        totals["No"].push(no);
        totals["Maybe"].push(maybe);
        totals["Conflict"].push(conflict);
        totals["No Response"].push(blank);
      }

      for (const label in totals) {
        matrix.push([label, ...totals[label]]);
      }

      const ws = XLSX.utils.aoa_to_sheet(matrix);

      for (let r = 1; r <= 5; r++) {
        for (let c = 0; c <= matchIds.length; c++) {
          const cell = ws[XLSX.utils.encode_cell({ r, c })];
          if (cell) cell.s = { font: { bold: true } };
        }
      }

      const statusColors = {
        Yes: "00C6EFCE",
        No: "00FFC7CE",
        Maybe: "00FFEB9C",
        Conflict: "00F4B084",
        "": "00E7E6E6",
      };

      for (let r = 6; r < 6 + playerList.length; r++) {
        for (let c = 1; c <= matchIds.length; c++) {
          const cell = ws[XLSX.utils.encode_cell({ r, c })];
          if (cell) {
            const color = statusColors[cell.v] || "00FFFFFF";
            cell.s = { fill: { fgColor: { rgb: color } } };
          }
        }
      }

      ws["!freeze"] = { xSplit: 1, ySplit: 6 };
      ws["!cols"] = [{ wch: 30 }, ...matchIds.map(() => ({ wch: 18 }))];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Team Availability");

      const missing = [["Player", "Missing For"]];
      for (const player of playerList) {
        const missingMatches = [];
        for (const matchId of matchIds) {
          const doc = await db
            .collection("availability")
            .doc(matchId)
            .collection("players")
            .doc(player)
            .get();
          if (!doc.exists) missingMatches.push(matchId);
        }
        if (missingMatches.length > 0) {
          missing.push([player, missingMatches.join(", ")]);
        }
      }
      XLSX.utils.book_append_sheet(
        wb,
        XLSX.utils.aoa_to_sheet(missing),
        "Missing Responses"
      );

      const summary = [];
      for (const match of sortedMatches) {
        summary.push([
          "Match ID", match["Match ID"],
          "League", match["League"],
          "Date", match["Schedule Date"],
          "Time", match["Schedule Time"],
          "Home", match["Home Team"],
          "Visiting", match["Visiting Team"],
        ]);
        summary.push([]);
      }
      XLSX.utils.book_append_sheet(
        wb,
        XLSX.utils.aoa_to_sheet(summary),
        "Match Summary"
      );

      XLSX.utils.book_append_sheet(
        wb,
        XLSX.utils.aoa_to_sheet([["Captain Notes"], [""]]),
        "Captain Notes"
      );

      const legend = [
        ["Legend"],
        ["Yes = Green"],
        ["No = Red"],
        ["Maybe = Yellow"],
        ["Conflict = Orange"],
        ["No Response = Gray"],
      ];
      XLSX.utils.book_append_sheet(
        wb,
        XLSX.utils.aoa_to_sheet(legend),
        "Legend"
      );

      XLSX.writeFile(wb, "team_availability.xlsx");
    }
  </script>
</body>
</html>
