<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Captain Dashboard</title>

  <style>
    body { font-family: Arial; margin: 0; padding: 0; background: #f4f4f4; }

    /* HEADER */
    .header {
      width: 100%;
      background: #1d3563;
      color: white;
      padding: 16px 24px;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    .hamburger {
      font-size: 26px;
      cursor: pointer;
      margin-right: 20px;
    }

    /* SIDEBAR */
    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      background-color: #1d3563;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
    }

    .sidebar a {
      padding: 12px 24px;
      text-decoration: none;
      font-size: 20px;
      color: white;
      display: block;
    }

    .sidebar a:hover {
      background: #2a4d8f;
    }

    .sidebar-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 30px;
      cursor: pointer;
      color: white;
    }

    /* CONTENT */
    .container {
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      vertical-align: top;
    }

    th {
      background: #1d3563;
      color: white;
    }

    .note {
      font-size: 13px;
      color: #444;
      margin-top: 4px;
      padding-left: 10px;
      border-left: 3px solid #ccc;
    }

    select {
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
      width: 200px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <span class="sidebar-close" onclick="closeNav()">&times;</span>
  <a href="index.html">Home</a>
  <a href="calendar.html">Calendar</a>
  <a href="availability.html">Availability</a>
  <a href="captain.html">Captain Dashboard</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- HEADER -->
<div class="header">
  <span class="hamburger" onclick="openNav()">&#9776;</span>
  PLC Tennis Team — Captain Dashboard
</div>

<div class="container">

  <!-- LEAGUE FILTER -->
  <label><strong>League:</strong></label><br>
  <select id="leagueSelect" onchange="renderFilteredMatches()">
    <option value="all">All</option>
    <option value="40">40+</option>
    <option value="55">55+</option>
  </select>

  <div id="matchesContainer">Loading...</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
/* -------------------- FIREBASE CONFIG -------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyBRS15FxZ8ekWvcAluTy2EKUVCMs0gkYPg",
  authDomain: "plc-tennis.firebaseapp.com",
  projectId: "plc-tennis",
  storageBucket: "plc-tennis.appspot.com",
  messagingSenderId: "472563332469",
  appId: "1:472563332469:web:b781075e99cd0f5a3c4f3c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* -------------------- SIDEBAR -------------------- */
function openNav() {
  document.getElementById("sidebar").style.width = "260px";
}
function closeNav() {
  document.getElementById("sidebar").style.width = "0";
}

/* -------------------- CAPTAIN ACCESS -------------------- */
const CAPTAINS = [
  "g@calona.com"
];

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  if (!CAPTAINS.includes(user.email)) {
    document.body.innerHTML = "<h2>Access Denied</h2><p>You are not a captain.</p>";
    return;
  }
  loadMatches();
});

function logout() {
  auth.signOut().then(() => window.location.href = "login.html");
}

/* -------------------- GOOGLE SHEET LOADING -------------------- */

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-KfGVV4zKjLXTxXpJcaHA7KIjpQGHfMPU6CIgmUYEnh1Aed-bwrnfZIn1M6B08qSKsC1QcQMQ6f9U/pub?output=csv";

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const next = text[i + 1];

    if (c === '"' && next === '"') {
      cell += '"';
      i++;
    } else if (c === '"') {
      insideQuotes = !insideQuotes;
    } else if (c === ',' && !insideQuotes) {
      row.push(cell);
      cell = "";
    } else if (c === '\n' && !insideQuotes) {
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += c;
    }
  }
  row.push(cell);
  rows.push(row);

  return rows;
}

let allMatches = [];

async function loadMatches() {
  const res = await fetch(SHEET_URL);
  const csv = await res.text();
  const rows = parseCSV(csv);

  const fieldNames = rows.map(r => r[0]?.trim()).filter(x => x);

  const matches = [];
  const numMatches = rows[0].length - 1;

  for (let col = 1; col <= numMatches; col++) {
    const match = {};
    for (let row = 0; row < fieldNames.length; row++) {
      const field = fieldNames[row];
      const value = rows[row][col]?.trim();
      if (field && value) match[field] = value;
    }
    if (match["Match ID"]) matches.push(match);
  }

  matches.sort((a, b) => new Date(a["Schedule Date"]) - new Date(b["Schedule Date"]));

  allMatches = matches;
  renderFilteredMatches();
}

/* -------------------- FILTER + RENDER -------------------- */

function renderFilteredMatches() {
  const league = document.getElementById("leagueSelect").value;

  const filtered = allMatches.filter(m => {
    if (league === "all") return true;
    if (league === "40") return m["League"]?.includes("40+");
    if (league === "55") return m["League"]?.includes("55+");
    return true;
  });

  renderMatches(filtered);
}

async function renderMatches(matches) {
  const container = document.getElementById("matchesContainer");
  container.innerHTML = "";

  for (const match of matches) {
    const matchId = match["Match ID"];
    const matchName = `${match["League"]} — ${match["Schedule Date"]} ${match["Schedule Time"]} — ${match["Home Team"]} vs ${match["Visiting Team"]}`;

    const box = document.createElement("div");
    box.className = "box";
    box.innerHTML = `<h2>${matchName}</h2><p>Loading availability...</p>`;
    container.appendChild(box);

    const snapshot = await db
      .collection("availability")
      .doc(matchId)
      .collection("players")
      .get();

    const yes = [];
    const no = [];
    const maybe = [];
    const conflict = [];

    snapshot.forEach(doc => {
      const data = doc.data();
      const entry = `
        <div>
          <strong>${data.email}</strong>
          ${data.notes ? `<div class="note">${data.notes}</div>` : ""}
        </div>
      `;

      if (data.status === "Yes") yes.push(entry);
      else if (data.status === "No") no.push(entry);
      else if (data.status === "Maybe") maybe.push(entry);
      else if (data.status === "Maybe - conflict") conflict.push(entry);
    });

    box.innerHTML = `
      <h2>${matchName}</h2>
      <table>
        <tr>
          <th>Yes</th>
          <th>No</th>
          <th>Maybe</th>
          <th>Conflict</th>
        </tr>
        <tr>
          <td>${yes.join("") || "-"}</td>
          <td>${no.join("") || "-"}</td>
          <td>${maybe.join("") || "-"}</td>
          <td>${conflict.join("") || "-"}</td>
        </tr>
      </table>
    `;
  }
}
</script>

</body>
</html>
