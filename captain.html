

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Captain Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <style>
    body {
      font-family: "Inter", sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    h2 {
      color: #1d3563;
      margin-bottom: 10px;
    }

    /* Excel Export Button */
    .excel-btn {
      background: #1d6f42;
      color: white;
      padding: 12px 22px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.25s ease;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
      margin-bottom: 20px;
    }

    .excel-btn:hover {
      background: #145a33;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.20);
    }

    .excel-icon {
      width: 20px;
      height: 20px;
      filter: brightness(0) invert(1);
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    th {
      background: #1d3563;
      color: white;
      font-weight: 600;
    }

    .status-Yes { background: #c6efce; }
    .status-No { background: #ffc7ce; }
    .status-Maybe { background: #ffeb9c; }
    .status-Conflict { background: #f4b084; }
    .status-Blank { background: #e7e6e6; }

    .totals-row {
      background: #f0f4ff;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <h2>Captain Dashboard</h2>

  <!-- Excel Export Button -->
  <button class="excel-btn" onclick="exportTeamAvailabilityMatrix()">
    <img class="excel-icon" 
         src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Microsoft_Office_Excel_%282019%E2%80%93present%29.svg" />
    Export Team Availability
  </button>

  <h3>Select Match</h3>
  <select id="matchSelect" onchange="loadMatchAvailability()"></select>

  <table id="availabilityTable"></table>

  <script>
    /* -----------------------------
       Firebase Initialization
    ----------------------------- */
    const firebaseConfig = {
      apiKey: "AIzaSyC2...",
      authDomain: "plc-tennis.firebaseapp.com",
      projectId: "plc-tennis",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    /* -----------------------------
       Load Matches from Google Sheet
    ----------------------------- */
    let allMatches = [];

    async function loadMatches() {
      const sheetUrl =
        "https://docs.google.com/spreadsheets/d/1Cm3hNVLPbLseLLYZKXj3ld1pLNdU1LHNj0f9uKCK4rY/gviz/tq?tqx=out:json";

      const res = await fetch(sheetUrl);
      const text = await res.text();
      const json = JSON.parse(text.substring(47, text.length - 2));

      allMatches = json.table.rows.map((r) => ({
        "Match ID": r.c[0]?.v,
        "League": r.c[1]?.v,
        "Schedule Date": r.c[2]?.v,
        "Schedule Time": r.c[3]?.v,
        "Home Team": r.c[4]?.v,
        "Visiting Team": r.c[5]?.v,
      }));

      const select = document.getElementById("matchSelect");
      allMatches.forEach((m) => {
        const opt = document.createElement("option");
        opt.value = m["Match ID"];
        opt.textContent = `${m["Match ID"]} — ${m["Schedule Date"]} ${m["Schedule Time"]}`;
        select.appendChild(opt);
      });

      loadMatchAvailability();
    }

    loadMatches();

    /* -----------------------------
       Load Availability for Match
    ----------------------------- */
    async function loadMatchAvailability() {
      const matchId = document.getElementById("matchSelect").value;
      const table = document.getElementById("availabilityTable");

      const snapshot = await db
        .collection("availability")
        .doc(matchId)
        .collection("players")
        .get();

      let rows = [];
      snapshot.forEach((doc) => {
        rows.push({ player: doc.id, status: doc.data().status });
      });

      rows.sort((a, b) => a.player.localeCompare(b.player));

      let html = `
        <tr>
          <th>Player</th>
          <th>Status</th>
        </tr>
      `;

      rows.forEach((r) => {
        const css = r.status ? `status-${r.status}` : "status-Blank";
        html += `
          <tr class="${css}">
            <td>${r.player}</td>
            <td>${r.status || ""}</td>
          </tr>
        `;
      });

      table.innerHTML = html;
    }

    /* -----------------------------
       FULL RESTORED EXPORT FUNCTION
    ----------------------------- */
    async function exportTeamAvailabilityMatrix() {
      // 1. Sort matches
      const sortedMatches = [...allMatches].sort(
        (a, b) => new Date(a["Schedule Date"]) - new Date(b["Schedule Date"])
      );

      const matchIds = sortedMatches.map((m) => m["Match ID"]);

      // 2. Collect players
      const players = new Set();
      for (const matchId of matchIds) {
        const snapshot = await db
          .collection("availability")
          .doc(matchId)
          .collection("players")
          .get();
        snapshot.forEach((doc) => players.add(doc.id));
      }
      const playerList = Array.from(players).sort();

      // 3. Build matrix
      const matrix = [];
      matrix.push(["Player", ...matchIds]);

      const metaRows = [
        ["League", ...sortedMatches.map((m) => m["League"])],
        ["Date", ...sortedMatches.map((m) => m["Schedule Date"])],
        ["Time", ...sortedMatches.map((m) => m["Schedule Time"])],
        ["Home Team", ...sortedMatches.map((m) => m["Home Team"])],
        ["Visiting Team", ...sortedMatches.map((m) => m["Visiting Team"])],
      ];
      metaRows.forEach((r) => matrix.push(r));

      for (const player of playerList) {
        const row = [player];
        for (const matchId of matchIds) {
          const doc = await db
            .collection("availability")
            .doc(matchId)
            .collection("players")
            .doc(player)
            .get();
          row.push(doc.exists ? doc.data().status : "");
        }
        matrix.push(row);
      }

      matrix.push([""]); // blank row

      // Totals
      const totals = {
        "Responses": [],
        "Yes": [],
        "No": [],
        "Maybe": [],
        "Conflict": [],
        "No Response": [],
      };

      for (const matchId of matchIds) {
        const snapshot = await db
          .collection("availability")
          .doc(matchId)
          .collection("players")
          .get();

        let yes = 0, no = 0, maybe = 0, conflict = 0, blank = 0;

        snapshot.forEach((doc) => {
          const status = doc.data().status;
          if (status === "Yes") yes++;
          else if (status === "No") no++;
          else if (status === "Maybe") maybe++;
          else if (status === "Conflict") conflict++;
          else blank++;
        });

        const totalPlayers = playerList.length;
        const responses = yes + no + maybe + conflict;

        totals["Responses"].push(`${responses}/${totalPlayers}`);
        totals["Yes"].push(yes);
        totals["No"].push(no);
        totals["Maybe"].push(maybe);
        totals["Conflict"].push(conflict);
        totals["No Response"].push(blank);
      }

      for (const label in totals) {
        matrix.push([label, ...totals[label]]);
      }

      // Worksheet
      const ws = XLSX.utils.aoa_to_sheet(matrix);

      // Bold metadata
      for (let r = 1; r <= 5; r++) {
        for (let c = 0; c <= matchIds.length; c++) {
          const cell = ws[XLSX.utils.encode_cell({ r, c })];
          if (cell) cell.s = { font: { bold: true } };
        }
      }

      // Colors
      const statusColors = {
        Yes: "00C6EFCE",
        No: "00FFC7CE",
        Maybe: "00FFEB9C",
        Conflict: "00F4B084",
        "": "00E7E6E6",
      };

      for (let r = 6; r < 6 + playerList.length; r++) {
        for (let c = 1; c <= matchIds.length; c++) {
          const cell = ws[XLSX.utils.encode_cell({ r, c })];
          if (cell) {
            const color = statusColors[cell.v] || "00FFFFFF";
            cell.s = { fill: { fgColor: { rgb: color } } };
          }
        }
      }

      ws["!freeze"] = { xSplit: 1, ySplit: 6 };
      ws["!cols"] = [{ wch: 30 }, ...matchIds.map(() => ({ wch: 18 }))];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Team Availability");

      // Missing Responses
      const missing = [["Player", "Missing For"]];
      for (const player of playerList) {
        const missingMatches = [];
        for (const matchId of matchIds) {
          const doc = await db
            .collection("availability")
            .doc(matchId)
            .collection("players")
            .doc(player)
            .get();
          if (!doc.exists) missingMatches.push(matchId);
        }
        if (missingMatches.length > 0) {
          missing.push([player, missingMatches.join(", ")]);
        }
      }
      XLSX.utils.book_append_sheet(
        wb,
        XLSX.utils.aoa_to_sheet(missing),
        "Missing Responses"
      );

      // Match Summary
      const summary = [];
      for (const match of sortedMatches) {
        summary.push([
          "Match ID", match["Match ID"],
          "League", match["League"],
          "Date", match["Schedule Date"],
          "Time", match["Schedule Time"],
          "Home", match["Home Team"],
          "Visiting", match["Visiting Team"],
        ]);
        summary.push([]);
      }
      XLSX.utils.book_append_sheet(
        wb,
        XLSX.utils.aoa_to_sheet(summary),
        "Match Summary"
      );

      // Notes
      XLSX.utils.book_append_sheet(
        wb,
        XLSX.utils.aoa_to_sheet([["Captain Notes"], [""]]),
        "Captain Notes"
      );

      // Legend
      const legend = [
        ["Legend"],
        ["Yes = Green"],
        ["No = Red"],
        ["Maybe = Yellow"],
        ["Conflict = Orange"],
        ["No Response = Gray"],
      ];
      XLSX.utils.book_append_sheet(
        wb,
        XLSX.utils.aoa_to_sheet(legend),
        "Legend"
      );

      XLSX.writeFile(wb, "team_availability.xlsx");
    }
  </script>

</body>
</html>
