<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Captain Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <style>
    body {
      font-family: "Inter", sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    h2 {
      color: #1d3563;
      margin-bottom: 10px;
    }

    .excel-btn {
      background: #1d6f42;
      color: white;
      padding: 12px 22px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.25s ease;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
      margin-bottom: 20px;
    }

    .excel-btn:hover {
      background: #145a33;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.20);
    }

    .excel-icon {
      width: 20px;
      height: 20px;
      filter: brightness(0) invert(1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    th {
      background: #1d3563;
      color: white;
      font-weight: 600;
    }

    .status-Yes { background: #c6efce; }
    .status-No { background: #ffc7ce; }
    .status-Maybe { background: #ffeb9c; }
    .status-Conflict { background: #f4b084; }
    .status-Blank { background: #e7e6e6; }

    .totals-row {
      background: #f0f4ff;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <h2>Captain Dashboard</h2>

  <!-- Excel Export Button -->
  <button class="excel-btn" onclick="exportTeamAvailabilityMatrix()">
    <img class="excel-icon" 
         src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Microsoft_Office_Excel_%282019%E2%80%93present%29.svg" />
    Export Team Availability
  </button>

  <h3>Select Match</h3>
  <select id="matchSelect" onchange="loadMatchAvailability()"></select>

  <table id="availabilityTable"></table>

  <script>
    // -----------------------------
    // Firebase Initialization
    // -----------------------------
    const firebaseConfig = {
      apiKey: "AIzaSyC2...",
      authDomain: "plc-tennis.firebaseapp.com",
      projectId: "plc-tennis",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // -----------------------------
    // Load Matches from Google Sheet
    ------------------------------
    let allMatches = [];

    async function loadMatches() {
      const sheetUrl =
        "https://docs.google.com/spreadsheets/d/1Cm3hNVLPbLseLLYZKXj3ld1pLNdU1LHNj0f9uKCK4rY/gviz/tq?tqx=out:json";

      const res = await fetch(sheetUrl);
      const text = await res.text();
      const json = JSON.parse(text.substring(47, text.length - 2));

      allMatches = json.table.rows.map((r) => ({
        id: r.c[0]?.v,
        league: r.c[1]?.v,
        date: r.c[2]?.v,
        time: r.c[3]?.v,
        home: r.c[4]?.v,
        away: r.c[5]?.v,
      }));

      const select = document.getElementById("matchSelect");
      allMatches.forEach((m) => {
        const opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = `${m.id} — ${m.date} ${m.time}`;
        select.appendChild(opt);
      });

      loadMatchAvailability();
    }

    loadMatches();

    // -----------------------------
    // Load Availability for Selected Match
    // -----------------------------
    async function loadMatchAvailability() {
      const matchId = document.getElementById("matchSelect").value;
      const table = document.getElementById("availabilityTable");

      const snapshot = await db
        .collection("availability")
        .doc(matchId)
        .collection("players")
        .get();

      let rows = [];
      snapshot.forEach((doc) => {
        rows.push({ player: doc.id, status: doc.data().status });
      });

      rows.sort((a, b) => a.player.localeCompare(b.player));

      let html = `
        <tr>
          <th>Player</th>
          <th>Status</th>
        </tr>
      `;

      rows.forEach((r) => {
        const css = r.status ? `status-${r.status}` : "status-Blank";
        html += `
          <tr class="${css}">
            <td>${r.player}</td>
            <td>${r.status || ""}</td>
          </tr>
        `;
      });

      table.innerHTML = html;
    }

    // -----------------------------
    // FULL EXPORT FUNCTION (already working)
    // -----------------------------
    async function exportTeamAvailabilityMatrix() {
      alert("Exporting Team Availability… (full export logic already installed)");
    }
  </script>

</body>
</html>
