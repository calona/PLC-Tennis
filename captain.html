<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Captain Dashboard</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }

    .box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 { margin-top: 0; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #1d3563;
      color: white;
    }

    .logout {
      background: #8b0000;
      color: white;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<button class="logout" onclick="logout()">Logout</button>
<h1>Captain Dashboard</h1>
<p>Viewing player availability for all matches.</p>

<div id="matchesContainer">Loading...</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "plc-tennis.firebaseapp.com",
  projectId: "plc-tennis",
  storageBucket: "plc-tennis.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Captain allow-list
const CAPTAINS = [
  "your-email@example.com",
  "another-captain@example.com"
];

// Redirect if not logged in or not captain
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  if (!CAPTAINS.includes(user.email)) {
    document.body.innerHTML = "<h2>Access Denied</h2><p>You are not a captain.</p>";
    return;
  }
  loadMatches();
});

function logout() {
  auth.signOut().then(() => window.location.href = "login.html");
}

// Google Sheet CSV
const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-KfGVV4zKjLXTxXpJcaHA7KIjpQGHfMPU6CIgmUYEnh1Aed-bwrnfZIn1M6B08qSKsC1QcQMQ6f9U/pub?output=csv";

// CSV parser
function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const next = text[i + 1];

    if (c === '"' && next === '"') {
      cell += '"';
      i++;
    } else if (c === '"') {
      insideQuotes = !insideQuotes;
    } else if (c === ',' && !insideQuotes) {
      row.push(cell);
      cell = "";
    } else if (c === '\n' && !insideQuotes) {
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += c;
    }
  }
  row.push(cell);
  rows.push(row);

  return rows;
}

async function loadMatches() {
  const res = await fetch(SHEET_URL);
  const csv = await res.text();
  const rows = parseCSV(csv);

  const fieldNames = rows.map(r => r[0]?.trim()).filter(x => x);

  const matches = [];
  const numMatches = rows[0].length - 1;

  for (let col = 1; col <= numMatches; col++) {
    const match = {};
    for (let row = 0; row < fieldNames.length; row++) {
      const field = fieldNames[row];
      const value = rows[row][col]?.trim();
      if (field && value) match[field] = value;
    }
    if (match["Match ID"]) matches.push(match);
  }

  matches.sort((a, b) => new Date(a["Schedule Date"]) - new Date(b["Schedule Date"]));

  renderMatches(matches);
}

async function renderMatches(matches) {
  const container = document.getElementById("matchesContainer");
  container.innerHTML = "";

  for (const match of matches) {
    const matchId = match["Match ID"];
    const matchName = `${match["League"]} — ${match["Schedule Date"]} ${match["Schedule Time"]} — ${match["Home Team"]} vs ${match["Visiting Team"]}`;

    // Create match box
    const box = document.createElement("div");
    box.className = "box";
    box.innerHTML = `<h2>${matchName}</h2><p>Loading availability...</p>`;
    container.appendChild(box);

    // Load availability
    const snapshot = await db
      .collection("availability")
      .doc(matchId)
      .collection("players")
      .get();

    const yes = [];
    const no = [];
    const maybe = [];

    snapshot.forEach(doc => {
      const data = doc.data();
      if (data.status === "Yes") yes.push(data.email);
      else if (data.status === "No") no.push(data.email);
      else if (data.status === "Maybe") maybe.push(data.email);
    });

    // Build table
    box.innerHTML = `
      <h2>${matchName}</h2>
      <table>
        <tr>
          <th>Yes</th>
          <th>No</th>
          <th>Maybe</th>
        </tr>
        <tr>
          <td>${yes.join("<br>") || "-"}</td>
          <td>${no.join("<br>") || "-"}</td>
          <td>${maybe.join("<br>") || "-"}</td>
        </tr>
      </table>
    `;
  }
}
</script>

</body>
</html>
