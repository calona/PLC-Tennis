<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PLC Tennis Team</title>

  <style>
    body { font-family: Arial; margin: 0; padding: 0; }

    .header {
      width: 100%;
      background: #1d3563;
      color: white;
      padding: 16px 20px;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    .hamburger {
      font-size: 26px;
      cursor: pointer;
      margin-right: 20px;
    }

    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      background-color: #1d3563;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
    }

    .sidebar a {
      padding: 12px 24px;
      text-decoration: none;
      font-size: 20px;
      color: white;
      display: block;
    }

    .sidebar a:hover {
      background: #2a4d8f;
    }

    .sidebar-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 30px;
      cursor: pointer;
      color: white;
    }

    .content {
      padding: 30px;
    }

    .home-box {
      background: #f4f4f4;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 18px;
    }

    .home-box a {
      color: #1d3563;
      font-weight: bold;
      text-decoration: none;
    }
  </style>

  <script>
    function openNav() {
      document.getElementById("sidebar").style.width = "260px";
    }
    function closeNav() {
      document.getElementById("sidebar").style.width = "0";
    }
  </script>
</head>

<body>

<div id="sidebar" class="sidebar">
  <span class="sidebar-close" onclick="closeNav()">&times;</span>
  <a href="index.html">Home</a>
  <a href="calendar.html">Calendar</a>
  <a href="availability.html">Availability</a>
  <a href="captain.html">Captain Dashboard</a>
</div>

<div class="header">
  <span class="hamburger" onclick="openNav()">&#9776;</span>
  PLC Tennis Team
</div>

<div class="content">
  <h1>Welcome to PLC Tennis</h1>

  <div class="home-box">
    <p>This site helps our team stay organized throughout the season.</p>

    <p><strong>Quick Links:</strong></p>
    <ul>
      <li><a href="calendar.html">View Match Calendar</a></li>
      <li><a href="availability.html">Submit Your Availability</a></li>
      <li><a href="captain.html">Captain Dashboard</a></li>
    </ul>
  </div>
</div>

</body>
</html>
