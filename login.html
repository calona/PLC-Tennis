<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PLC Tennis Login</title>

  <style>
    body { font-family: Arial; padding: 40px; background: #f4f4f4; }
    .box {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #1d3563;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { opacity: 0.9; }
    .secondary {
      margin-top: 10px;
      background: #2a4d8f;
    }
    #msg { margin-top: 10px; color: red; }
  </style>
</head>

<body>

<div class="box">
  <h2>PLC Tennis Login</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password (6+ characters)">

  <button onclick="login()">Login</button>
  <button class="secondary" onclick="signup()">Create Account</button>

  <div id="msg"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBRS15FxZ8ekWvcAluTy2EKUVCMs0gkYPg",
  authDomain: "plc-tennis.firebaseapp.com",
  projectId: "plc-tennis",
  storageBucket: "plc-tennis.appspot.com",   // FIXED
  messagingSenderId: "472563332469",
  appId: "1:472563332469:web:b781075e99cd0f5a3c4f3c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function showError(msg) {
  document.getElementById("msg").style.color = "red";
  document.getElementById("msg").innerText = msg;
}

function showSuccess(msg) {
  document.getElementById("msg").style.color = "green";
  document.getElementById("msg").innerText = msg;
}

function login() {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value;

  if (!email || !pass) {
    showError("Please enter email and password.");
    return;
  }

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
      showSuccess("Logged in. Redirecting...");
      window.location.href = "calendar.html";
    })
    .catch(err => showError(err.message));
}

function signup() {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value;

  if (!email || !pass) {
    showError("Please enter email and password.");
    return;
  }

  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => {
      showSuccess("Account created. Redirecting...");
      window.location.href = "calendar.html";
    })
    .catch(err => showError(err.message));
}
</script>

</body>
</html>
